}
function b64EncodeUnicode(str){
  return btoa(unescape(encodeURIComponent(str)));
}
/* Commit data.json to the repo via GitHub Contents API */
async function ghCommitData(cfg,dataObj,onStatus,pathOverride,msgOverride){
  if(!cfg.repo||!cfg.token)throw new Error('repo와 토큰이 필요합니다');
  const [owner,repo]=cfg.repo.split('/');
  if(!owner||!repo)throw new Error('repo 형식은 owner/repo 입니다');
  const path=pathOverride||cfg.path;
  const api=`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`;
  const headers={'Authorization':'token '+cfg.token,'Accept':'application/vnd.github+json'};
  let sha=undefined;
  onStatus&&onStatus('기존 파일 확인 중…');
  try{
    const r=await fetch(api+'?ref='+encodeURIComponent(cfg.branch),{headers});
    if(r.ok){const j=await r.json();sha=j.sha;}
  }catch(_){}
  onStatus&&onStatus('GitHub에 커밋 중…');
  const body={
    message:msgOverride||('Update dashboard data ('+new Date().toISOString().slice(0,10)+')'),
    content:b64EncodeUnicode(JSON.stringify(dataObj)),
    branch:cfg.branch
  };
  if(sha)body.sha=sha;
  const res=await fetch(api,{method:'PUT',headers,body:JSON.stringify(body)});
  if(!res.ok){
    let msg='커밋 실패 ('+res.status+')';
    try{const e=await res.json();if(e.message)msg+=': '+e.message;}catch(_){}
    throw new Error(msg);
  }
  return true;
}
/* Load remote campaigns.json (same repo, sibling of data.json) */
async function ghTryLoadCampaigns(){
  const cfg=(window.__GH__&&window.__GH__.repo)?window.__GH__:null;
  let saved=null;try{saved=JSON.parse(localStorage.getItem(GH_LS_KEY)||'null');}catch(_){}
  const src=cfg||saved;
  if(!src||!src.repo)return false;
  const [owner,repo]=src.repo.split('/');if(!owner||!repo)return false;
  const branch=src.branch||'main';
  const rawUrl=`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/campaigns.json?t=${Date.now()}`;
  try{
    const r=await fetch(rawUrl,{cache:'no-store'});
    if(!r.ok)return false;
    const arr=await r.json();
    if(Array.isArray(arr)){setCampaigns(arr);
      if(state&&CFG.views[state.view])renderView(CFG.views[state.view]);return true;}
  }catch(_){}
  return false;
}
/* On load: try to fetch remote data.json (raw) and swap in if valid */
async function ghTryLoadRemote(){
  /* Re-enabled per request: load data.json from the GitHub repo on open.
     The remote file must always be the latest export; it overrides the embedded data. */
  const cfg=(window.__GH__&&window.__GH__.repo)?window.__GH__:null;
  let saved=null;try{saved=JSON.parse(localStorage.getItem(GH_LS_KEY)||'null');}catch(_){}
  const src=cfg||saved;
  if(!src||!src.repo)return false;
  const [owner,repo]=src.repo.split('/');if(!owner||!repo)return false;
  const branch=src.branch||'main',path=(src.path||'data.json');
  const rawUrl=`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}?t=${Date.now()}`;
  try{
    const r=await fetch(rawUrl,{cache:'no-store'});
    if(!r.ok)return false;
    const nd=await r.json();
    if(nd&&nd.blocks&&nd.blocks.length){applyNewData(nd);return true;}
  }catch(_){}
  return false;
}

function wireUpload(){
  const btn=document.getElementById('xlsBtn'),inp=document.getElementById('xlsInput'),st=document.getElementById('xlsStatus');
  if(!btn||!inp)return;
  ghLoadSaved();
  btn.onclick=()=>inp.click();
  inp.onchange=(e)=>{
    const file=e.target.files&&e.target.files[0];if(!file)return;
    st.className='upload-status';st.textContent='파일 읽는 중…';
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        if(!wb.SheetNames.some(s=>{const u=String(s).toUpperCase();return u==='TABLE'||String(s).trim()==='타겟층TABLE'||(u.includes('TABLE')&&!u.includes('INDEX'));})){
          st.className='upload-status err';st.textContent='오류: 타겟층TABLE(또는 TABLE) 시트를 찾을 수 없습니다.';return;
        }
        const nd=parseWorkbook(wb);
        if(!nd.blocks.length){st.className='upload-status err';st.textContent='오류: 데이터 블록을 읽지 못했습니다.';return;}
        const chk=validateNewData(nd);
        if(!chk.ok){st.className='upload-status err';st.textContent='오류: 기존 대시보드 문항과 매칭되는 데이터가 없습니다.';return;}
        applyNewData(nd);
        const dropped=CFG._allViews.length-CFG.views.length;
        st.className='upload-status ok';
        st.innerHTML=`✓ 화면 반영 완료 · 블록 ${nd.blocks.length}개`+(dropped>0?`<br>미매칭 ${dropped}개 문항 제외됨`:'');
        /* Persist to GitHub if configured */
        const gh=ghReadCfg();
        if(gh.remember=document.getElementById('ghRemember')&&document.getElementById('ghRemember').checked)ghSaveCfg(gh);
        if(gh.repo&&gh.token){
          ghCommitData(gh,nd,(m)=>{st.className='upload-status';st.textContent=m;})
            .then(()=>{st.className='upload-status ok';st.innerHTML=`✓ GitHub 저장 완료 · 블록 ${nd.blocks.length}개<br>모든 방문자에게 영구 반영됩니다`;})
            .catch(err=>{st.className='upload-status err';st.innerHTML=`화면엔 반영됨 · GitHub 저장 실패<br>${err.message}`;});
        }else if(gh.repo&&!gh.token){
          st.innerHTML+=`<br><span style="color:#c9a24a">토큰 미입력 — 이 브라우저에서만 반영(임시)</span>`;
        }
      }catch(err){
        st.className='upload-status err';st.textContent='오류: '+(err&&err.message||'파일 파싱 실패');
      }
    };
    reader.onerror=()=>{st.className='upload-status err';st.textContent='오류: 파일을 읽을 수 없습니다.';};
    reader.readAsArrayBuffer(file);
    inp.value='';
  };
  /* Campaign schedule upload */
  const cbtn=document.getElementById('campBtn'), cinp=document.getElementById('campInput');
  if(cbtn&&cinp){
    cbtn.onclick=()=>cinp.click();
    cinp.onchange=(e)=>{
      const file=e.target.files&&e.target.files[0];if(!file)return;
      st.className='upload-status';st.textContent='캠페인 파일 읽는 중…';
      const rd=new FileReader();
      rd.onload=(ev)=>{
        try{
          const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
          const camps=parseCampaignWorkbook(wb);
          if(!camps.length){st.className='upload-status err';st.textContent='오류: 캠페인 데이터를 읽지 못했습니다. (연도/일정/캠페인명 행 확인)';return;}
          setCampaigns(camps);
          if(CFG.views[state.view])renderView(CFG.views[state.view]);
          st.className='upload-status ok';
          st.innerHTML=`✓ 캠페인 ${camps.length}건 화면 반영`;
          const gh=ghReadCfg();
          if(document.getElementById('ghRemember')&&document.getElementById('ghRemember').checked)ghSaveCfg(gh);
          if(gh.repo&&gh.token){
            ghCommitData(gh,camps,(m)=>{st.className='upload-status';st.textContent=m;},'campaigns.json','Update campaigns ('+new Date().toISOString().slice(0,10)+')')
              .then(()=>{st.className='upload-status ok';st.innerHTML=`✓ 캠페인 GitHub 저장 완료 · ${camps.length}건<br>모든 방문자에게 반영됩니다`;})
              .catch(err=>{st.className='upload-status err';st.innerHTML=`화면엔 반영됨 · GitHub 저장 실패<br>${err.message}`;});
          }else if(gh.repo&&!gh.token){
            st.innerHTML+=`<br><span style="color:#c9a24a">토큰 미입력 — 이 브라우저에서만 반영(임시)</span>`;
          }
        }catch(err){st.className='upload-status err';st.textContent='오류: '+(err&&err.message||'캠페인 파싱 실패');}
      };
      rd.onerror=()=>{st.className='upload-status err';st.textContent='오류: 파일을 읽을 수 없습니다.';};
      rd.readAsArrayBuffer(file);
      cinp.value='';
    };
  }
}

/* ===== init ===== */
CFG._allViews=CFG.views.slice(); /* master list for re-filtering on upload */
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value.trim();renderList();});
window.addEventListener('resize',()=>{if(chart)chart.resize();});
/* Admin mode: upload / GitHub-save UI is shown only when URL has ?admin=1 (or #admin) */
(function(){
  const params=new URLSearchParams(location.search);
  const isAdmin=params.get('admin')==='1'||location.hash.replace('#','')==='admin';
  const wrap=document.querySelector('.upload-wrap');
  if(isAdmin){ if(wrap)wrap.style.display=''; wireUpload(); }
  else if(wrap){ wrap.style.display='none'; }
})();
/* first render with embedded data, then try to overlay remote data.json */
renderList();
const tomIdx=CFG.views.findIndex(v=>v.title.includes('TOM'));
state.view=tomIdx>=0?tomIdx:0;state.openSecs.add(CFG.views[state.view].section);
renderList();renderView(CFG.views[state.view]);
ghTryLoadRemote();
ghTryLoadCampaigns();

</script>
