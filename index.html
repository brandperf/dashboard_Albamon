<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>알바몬 브랜드 트래킹 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --paper:#FAF9F6; --panel:#FFFFFF; --ink:#14182A; --ink2:#3A4055; --soft:#6B7186;
  --line:#E8E5DD; --line2:#F0EEE8; --side:#15192B; --side2:#1E2440; --sideTx:#C9CEE0;
  --jk:#F5741E; --jk-soft:#FCE9D9; --sr:#E9A400; --sr-soft:#FBF0CE;
  --up:#0E8A5F; --down:#D33A57; --gold:#B6892F; --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;font-feature-settings:"tnum";}
.tnum{font-variant-numeric:tabular-nums}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.side{width:340px;flex:0 0 340px;background:var(--side);color:var(--sideTx);display:flex;flex-direction:column;border-right:1px solid #0c0f1c}
.side-h{padding:22px 22px 14px}
.brand{display:flex;align-items:center;gap:10px;font-size:12px;letter-spacing:.14em;color:#7C84A8;text-transform:uppercase;font-weight:600}
.brand .dot{width:8px;height:8px;border-radius:2px;background:var(--jk);box-shadow:0 0 0 3px rgba(245,116,30,.25)}
.side-h h1{margin:12px 0 4px;font-size:19px;line-height:1.3;color:#fff;font-weight:700;letter-spacing:-.01em}
.side-h .sub{font-size:12px;color:#7C84A8}
.search{padding:0 18px 12px}
.search input{width:100%;background:#0e1222;border:1px solid #2A3050;color:#E7EAF4;border-radius:10px;padding:11px 13px;font-size:13.5px;outline:none}
.search input::placeholder{color:#5B628A}
.search input:focus{border-color:var(--jk)}
.list{flex:1;overflow-y:auto;padding:4px 10px 24px}
.list::-webkit-scrollbar{width:9px}
.list::-webkit-scrollbar-thumb{background:#2A3050;border-radius:9px;border:2px solid var(--side)}
.sec{margin:6px 4px 2px}
.sec-h{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;border-radius:9px;user-select:none}
.sec-h:hover{background:#1c2238}
.sec-h .nm{flex:1;font-size:12px;letter-spacing:.08em;font-weight:700;color:#aab1d6;text-transform:uppercase}
.sec-h .ct{font-size:11px;color:#5E658C}
.sec-h .cv{color:#5E658C;transition:transform .2s;font-size:11px}
.sec.open .sec-h .cv{transform:rotate(90deg)}
.sec-items{display:none;padding:2px 0 8px}
.sec.open .sec-items{display:block}
.item{display:flex;gap:8px;align-items:flex-start;padding:9px 12px 9px 14px;border-radius:9px;cursor:pointer;font-size:13px;line-height:1.42;color:#AEB4D4}
.item:hover{background:#1c2238}
.item.on{background:var(--jk);color:#fff}
.item .nm{flex:1}
.empty{padding:30px 16px;color:#5E658C;font-size:13px;text-align:center}

/* Main */
.main{flex:1;overflow-y:auto;padding:24px 30px 60px}
.crumb{font-size:11.5px;color:var(--soft);letter-spacing:.04em;margin-bottom:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.crumb .pill{background:var(--jk-soft);color:var(--jk);padding:2px 9px;border-radius:6px;font-weight:700;font-size:11px}
h2.qt{margin:0;font-size:23px;font-weight:750;letter-spacing:-.015em;line-height:1.25;max-width:820px}
.subline{font-size:12px;color:var(--soft);margin-top:8px}
.warn{background:#FFF3F0;color:#C0392B;border:1px solid #F3C9C0;padding:2px 9px;border-radius:7px;font-weight:600;margin-left:6px}

.kpi-anchor-removed{display:none}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.kpis{display:grid;grid-template-columns:1fr 1.6fr 1.6fr 1.6fr;gap:12px;margin:18px 0}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;overflow-x:auto}
.kpi.kpi-wide{padding:14px 14px}
.kpi .lab{font-size:11.5px;color:var(--soft);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.kpi .lab .sw{width:9px;height:9px;border-radius:3px;background:var(--jk)}
.kpi .val{font-size:26px;font-weight:760;letter-spacing:-.02em;line-height:1}
.kpi .val small{font-size:13px;font-weight:600;color:var(--soft);margin-left:2px}
.kpi .delta{font-size:19px;font-weight:730;line-height:1}
.kpi-wide .delta{font-size:15px;margin-bottom:6px}
.kpi .cmp{font-size:11.5px;color:var(--soft);margin-top:7px}
.kpi .cmp b{color:var(--ink2);font-weight:650}
.kpitab{width:100%;margin-top:2px;border-collapse:collapse}
.kpitab th{font-size:9.5px;font-weight:600;color:var(--soft);text-align:center;padding:2px 3px;border:1px solid var(--line2);background:#fbfaf7;white-space:nowrap}
.kpitab td{font-size:11px;font-weight:700;color:var(--ink);text-align:center;padding:3px 3px;border:1px solid var(--line2);white-space:nowrap}
.upload-wrap{padding:0 16px 12px}
.upload-btn{width:100%;font:inherit;font-size:12.5px;font-weight:600;color:#E7EAF4;background:#1a1f36;border:1px solid #2A3050;border-radius:9px;padding:9px 11px;cursor:pointer;transition:background .15s}
.upload-btn:hover{background:#242a45}
.upload-status{font-size:10.5px;color:#8891ab;margin-top:6px;line-height:1.5;word-break:keep-all}
.upload-status.ok{color:#5FD08A}
.upload-status.err{color:#F08A8A}
.gh-cfg{margin-top:8px;font-size:11px}
.gh-cfg summary{cursor:pointer;color:#8891ab;font-size:11px;user-select:none;padding:4px 0}
.gh-cfg summary:hover{color:#b9c0d8}
.gh-fields{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.gh-fields input[type=text],.gh-fields input[type=password]{width:100%;background:#0e1222;border:1px solid #2A3050;color:#E7EAF4;border-radius:7px;padding:7px 9px;font-size:11px;outline:none;box-sizing:border-box}
.gh-fields input:focus{border-color:#3a5bd0}
.gh-remember{display:flex;align-items:center;gap:6px;color:#8891ab;font-size:10.5px;cursor:pointer}
.gh-hint{color:#6a7290;font-size:10px;line-height:1.5;word-break:keep-all}
.qnote{font-size:11px;color:var(--soft);padding:10px 16px 12px;border-top:1px solid var(--line2);line-height:1.6;background:var(--paper)}
@keyframes chartBarIn{0%{opacity:0;transform:translateY(14px) scaleY(0.95)}60%{opacity:1}100%{opacity:1;transform:translateY(0) scaleY(1)}}
.chart-bar-enter{animation:chartBarIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both}
.gapstrip{border-radius:8px;margin:8px 8px 2px;padding:6px 0}
.gapstrip .gap-body{padding:0 16px 2px}
.gapstrip .gap-body.gap-collapsed{display:none}
.campstrip{background:#F0F2F7;border:0.5px solid #D8DCE8;border-radius:8px;margin:16px 8px 6px;padding:6px 0}
.campstrip .camp-body{padding:2px 0 4px}
.campstrip .camp-body.camp-collapsed{display:none}
.strip-title{font-size:11.5px;font-weight:700;color:#5A607A;padding:2px 16px 4px}
.gapstrip .strip-title{color:var(--ink2)}
.btn-on{background:rgba(245,116,30,0.1)!important;color:var(--jk)!important;border-color:rgba(245,116,30,0.35)!important}
@media(max-width:1200px){.kpis{grid-template-columns:1fr 1fr}}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--soft)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line2);flex-wrap:wrap}
.card-h .t{font-size:14px;font-weight:700}
.ctrls{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.seg{display:inline-flex;background:var(--line2);border-radius:9px;padding:3px}
.seg button{border:0;background:transparent;font:inherit;font-size:12px;font-weight:600;color:var(--soft);padding:5px 11px;border-radius:7px;cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.btn{border:1px solid var(--line);background:#fff;font:inherit;font-size:12px;font-weight:600;color:var(--ink2);padding:6px 11px;border-radius:8px;cursor:pointer}
.btn:hover{border-color:#cfcabc}
select.msel{font:inherit;font-size:12px;font-weight:600;color:var(--ink2);border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#fff;cursor:pointer}
.ctrl-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px 8px;padding:10px 16px 10px;border-bottom:1px solid var(--line2)}
.ctrl-label{font-size:11px;font-weight:700;color:var(--soft);white-space:nowrap}
.ctrl-sep{width:1px;height:20px;background:var(--line);margin:0 4px;flex-shrink:0}
.period-tilde{color:var(--soft);font-size:11px;padding:0 2px}
.qbtn{font:inherit;font-size:12px;font-weight:600;color:var(--ink2);background:#fff;border:1px solid var(--line);padding:5px 11px;border-radius:9px;cursor:pointer;white-space:nowrap}
.qbtn:hover{border-color:#cfcabc;background:#faf9f6}
/* brand / stmt dropdown */
.dd-wrap{position:relative;flex-shrink:0}
.dd-btn{font:inherit;font-size:12.5px;font-weight:600;color:var(--ink2);background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 11px;cursor:pointer;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.dd-btn:hover{border-color:#cfcabc}
button{outline:none}button:focus{outline:none}
.dd-wrap.open .dd-btn{border-color:#aaa;color:var(--ink2)}
.dd-menu{display:none;position:absolute;top:calc(100% + 5px);left:0;z-index:400;background:#fff;border:1px solid var(--line);border-radius:11px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.13);min-width:160px;max-height:300px;overflow-y:auto}
.dd-wrap.open .dd-menu{display:block}
.dd-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--ink2);white-space:nowrap}
.dd-item:hover{background:var(--line2)}
.dd-item input{accent-color:var(--jk);cursor:pointer}
.dd-preset{border:0;background:var(--jk-soft);color:var(--jk);font:inherit;font-size:11.5px;font-weight:700;padding:4px 8px;border-radius:7px;cursor:pointer;margin:0 6px 4px;width:calc(100% - 12px)}
.dd-preset:hover{background:#d4dcff}
.dd-deselect-all{padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;border-radius:7px;user-select:none}
.dd-deselect-all:hover{background:var(--line2)}
.dd-select-all{padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;border-radius:7px;user-select:none}
.dd-select-all:hover{background:var(--line2)}
.dd-divider{height:1px;background:var(--line2);margin:4px 0}
.jk-lab{color:var(--ink)}
.sr-lab{color:var(--ink)}
.chip{font-size:11.5px;padding:5px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--soft);cursor:pointer;user-select:none;white-space:nowrap}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip.dim{opacity:.45;filter:grayscale(.3)}
.chip.jk.on{background:var(--jk);border-color:var(--jk)}
.chip.sr.on{background:var(--sr);border-color:var(--sr)}
.chip-mini{font-size:11px;padding:3px 8px;opacity:1!important;filter:none!important}
.seg button.dis,.seg button:disabled{opacity:.32;cursor:not-allowed;text-decoration:line-through}
.stack-drop{display:none;flex-direction:column;gap:2px;position:absolute;
  top:calc(100% + 6px);left:0;z-index:300;
  background:#fff;border:1px solid var(--line);border-radius:10px;padding:5px;
  box-shadow:0 6px 18px rgba(0,0,0,.14);min-width:136px}
.stack-drop button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:600;color:var(--soft);
  padding:8px 13px;border-radius:8px;cursor:pointer;text-align:left;width:100%;transition:background .1s}
.stack-drop button:hover{background:var(--line2);color:var(--ink)}
.stack-drop button.on{background:var(--jk);color:#fff}
.chart{height:440px;width:100%;padding:8px 8px 4px}
.chart.sm{height:330px}
.note{padding:10px 16px 14px;font-size:11.5px;color:var(--soft)}
.note b{color:var(--ink2)}

table{width:100%;border-collapse:collapse;font-size:12px}
.tbl-wrap{overflow:auto;max-height:440px}
th,td{padding:7px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line2)}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--panel);font-weight:600;z-index:1}
thead th{position:sticky;top:0;background:#fbfaf7;color:var(--soft);font-weight:600;font-size:11px;z-index:2}
thead th:first-child{z-index:3}
/* kpitab (MoM/YoY/전년평균 표) has no sticky label column — first cell should match the rest, not the raw-table sticky style */
.kpitab th:first-child{position:static;text-align:center;background:#fbfaf7;font-weight:600}
.kpitab td:first-child{position:static;text-align:center;background:transparent;font-weight:700}
tbody tr.derived td{color:var(--soft)}
.derived td:first-child{color:var(--gold);font-weight:600}
.collapsed .tbl-wrap,.collapsed .note{display:none}
.chev{transition:transform .2s;color:var(--soft)} .collapsed .chev{transform:rotate(-90deg)}
@media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr)}.side{width:280px;flex-basis:280px}}
</style>

<div class="app">
  <aside class="side">
    <div class="side-h">
      <div class="brand"><span class="dot"></span> Brand Tracking</div>
      <h1>알바몬 브랜드 경쟁력 진단</h1>
      <div class="sub">소비자 트래킹 · 21년 12월–26년 6월</div>
    </div>
    <div class="search"><input id="q" placeholder="문항 검색" autocomplete="off"></div>
    <div class="upload-wrap" style="display:none">
      <input type="file" id="xlsInput" accept=".xlsx,.xls" style="display:none">
      <button class="upload-btn" id="xlsBtn">📊 엑셀 데이터 교체</button>
      <input type="file" id="campInput" accept=".xlsx,.xls" style="display:none">
      <button class="upload-btn" id="campBtn" style="margin-top:6px">📣 캠페인 일정 업로드</button>
      <div class="upload-status" id="xlsStatus"></div>
      <details class="gh-cfg" id="ghCfg">
        <summary>⚙️ GitHub 영구 저장 설정</summary>
        <div class="gh-fields">
          <input type="text" id="ghRepo" placeholder="owner/repo (예: hong/dashboard)">
          <input type="text" id="ghPath" placeholder="data 파일 경로 (예: data.json)">
          <input type="text" id="ghBranch" placeholder="브랜치 (기본: main)">
          <input type="password" id="ghToken" placeholder="GitHub 토큰 (repo 권한)">
          <label class="gh-remember"><input type="checkbox" id="ghRemember"> 이 브라우저에 설정 기억</label>
          <div class="gh-hint">토큰 입력 시 업로드하면 repo에 영구 저장되어 모든 방문자에게 반영됩니다. 토큰 없이 업로드하면 이 브라우저에서만(임시) 반영됩니다.</div>
        </div>
      </details>
    </div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main" id="main"></main>
</div>

/* ===== Excel parser: rebuild data object from an uploaded workbook (mirrors parse.py) ===== */
function xlsNum(v){
  if(v==null)return null;
  if(typeof v==='number')return Math.round(v*10000)/10000;
  if(typeof v==='string'){const s=v.trim();if(['-','','.',' '].includes(s))return null;
    const n=parseFloat(s.replace(/,/g,''));return isNaN(n)?null:Math.round(n*10000)/10000;}
  return null;
}
/* Read a sheet into a 1-indexed cell accessor: cell(r,c) → value */
function sheetAccessor(ws){
  const range=XLSX.utils.decode_range(ws['!ref']);
  const maxRow=range.e.r+1, maxCol=range.e.c+1;
  function cell(r,c){ /* 1-indexed */
    const addr=XLSX.utils.encode_cell({r:r-1,c:c-1});
    const cc=ws[addr];return cc?cc.v:null;
  }
  return {cell,maxRow,maxCol};
}
function parseWorkbook(wb){
  const categorize=(name)=>{
    const n=name, code=name.split('.')[0].trim();
    if(/^(SQ|.*거주지|.*직업|.*구직 경로)/.test(n)||code.startsWith('SQ'))return '표본 특성';
    if(n.includes('웍스피어')||n.includes('패밀리')||code.startsWith('R'))return '리브랜딩';
    if(n.includes('AI 기반')||code.startsWith('E')||code.startsWith('A5'))return 'AI 서비스';
    if(n.includes('감성적 이미지')||n.includes('기능적 이미지')||n.includes('사회적 이미지'))return '브랜드 이미지';
    if(n.includes('호감도')||n.includes('선호도')||n.includes('네이밍'))return '호감 · 선호';
    if(n.includes('TOM')||n.includes('상기')||n.includes('인지도')||n.includes('리딩 기업'))return '인지 · 상기';
    if(n.includes('만족')||n.includes('이용 경험')||n.includes('주 이용')||n.includes('접속')||n.includes('사용 시간'))return '이용 · 만족';
    if(n.includes('이용 의향')||/first choice/i.test(n)||n.includes('추천 의향'))return '의향 · 추천';
    return '기타';
  };
  const monthRe=/^\d+\s*년\s*\d+\s*월$/;
  /* ---- TABLE sheet: 알바몬 트래킹 = '타겟층TABLE'(타겟층 응답자) 시트만 사용, 2단 헤더(세그먼트+월) 구조 ---- */
  const tableName = wb.SheetNames.find(s=>String(s).trim()==='타겟층TABLE')
    || wb.SheetNames.find(s=>{const u=String(s);return u.includes('타겟')&&u.includes('TABLE')&&!u.includes('INDEX');})
    || wb.SheetNames.find(s=>String(s).toUpperCase()==='TABLE')
    || wb.SheetNames.find(s=>{const u=String(s);return u.includes('TABLE')&&!u.includes('INDEX');})
    || wb.SheetNames[0];
  const ws=sheetAccessor(wb.Sheets[tableName]);
  const {cell,maxRow,maxCol}=ws;
  const titleRows=[];
  for(let r=1;r<=maxRow;r++){const a=cell(r,1);if(typeof a==='string'&&/^\[[^\]]+\]/.test(a.trim()))titleRows.push(r);}
  titleRows.push(maxRow+1);
  const blocks=[];
  for(let i=0;i<titleRows.length-1;i++){
    const start=titleRows[i], end=titleRows[i+1];
    const title=String(cell(start,1)).trim();
    let segR=null;
    for(let r=start+1;r<Math.min(start+4,end);r++){const cv=cell(r,3);if(typeof cv==='string'&&cv.includes('전')){segR=r;break;}}
    if(segR==null)continue;
    let monR=segR+1, hasNext=false;
    for(let c=4;c<=maxCol;c++){const v=cell(monR,c);if(typeof v==='string'&&monthRe.test(v.trim())){hasNext=true;break;}}
    if(!hasNext)monR=segR;
    const segLabels=[];for(let c=4;c<=maxCol;c++){const v=cell(segR,c);if(typeof v==='string'&&v.trim()!=='')segLabels.push({c,label:v.trim()});}
    let chosenStart=4, chosenEnd=maxCol;
    if(segLabels.length){
      const segs=segLabels.map((sl,idx)=>({start:sl.c,end:(idx+1<segLabels.length?segLabels[idx+1].c-1:maxCol),label:sl.label}));
      segs.forEach(sg=>{let n=0;for(let c=sg.start;c<=sg.end;c++){const v=cell(monR,c);if(typeof v==='string'&&monthRe.test(v.trim()))n++;}sg.mcount=n;});
      let chosen=segs.find(sg=>sg.label.replace(/\s/g,'').includes('전체타겟'));
      if(!chosen)chosen=segs.slice().sort((a,b)=>b.mcount-a.mcount)[0];
      if(chosen){chosenStart=chosen.start;chosenEnd=chosen.end;}
    }
    const months=[], monthCols=[];
    for(let c=chosenStart;c<=chosenEnd;c++){const v=cell(monR,c);if(typeof v==='string'&&monthRe.test(v.trim())){months.push(v.trim());monthCols.push(c);}}
    if(!months.length)continue;
    let sample=null;const series=[];
    for(let r=monR+1;r<end;r++){
      let label=cell(r,1);if(label==null)continue;label=String(label).trim();if(label==='')continue;
      if(/^BASE\s*:/i.test(label))continue;
      const vals=monthCols.map(c=>xlsNum(cell(r,c)));
      const total=xlsNum(cell(r,3));
      if(label==='사례수'||label==='사례수(명)')sample={total,values:vals,yearValues:null};
      else series.push({label,total,values:vals,yearValues:null});
    }
    const is10=series.some(s=>/^\(10\)/.test(s.label));
    series.forEach(s=>{let L=String(s.label).trim();
      L=L.replace('Middle1%','Mid1%').replace('Bottom2%','Bot2%').replace('Bottom7%','Bot7%').replace('Bottom6%','Bot6%');
      s.label=L;});
    if(is10){const mean=series.find(s=>/MEAN/.test(s.label));const hasNPS=series.some(s=>/NPS/.test(s.label));if(mean&&!hasNPS)mean.label='▷ NPS';}
    const m=title.match(/^\[([^\]]+)\]\s*(.*)/);
    const tag=m?m[1]:'', name=m?m[2]:title;
    blocks.push({category:categorize(name),title,tag,name,months,years:[],sample,series});
  }
  /* ---- BPI sheet (월 헤더 자동 탐지) ---- */
  let bpi={title:'BPI',months:[],series:[]};
  const bpiName=wb.SheetNames.find(s=>String(s).toUpperCase()==='BPI');
  if(bpiName){
    const b=sheetAccessor(wb.Sheets[bpiName]);
    let hdr=null,best=-1;
    for(let r=1;r<=b.maxRow;r++){let n=0;for(let c=1;c<=b.maxCol;c++){const v=b.cell(r,c);if(typeof v==='string'&&monthRe.test(v.trim()))n++;}if(n>best){best=n;hdr=r;}}
    const bpiMonths=[],bpiCols=[];
    if(hdr){for(let c=1;c<=b.maxCol;c++){const v=b.cell(hdr,c);if(typeof v==='string'&&monthRe.test(v.trim())){bpiMonths.push(v.trim());bpiCols.push(c);}}}
    const bpiSeries=[];
    for(let r=hdr+1;r<=b.maxRow;r++){
      let lab=b.cell(r,2); if(lab==null||String(lab).trim()==='')lab=b.cell(r,1);
      if(lab&&typeof lab==='string'&&String(lab).trim()!==''&&!/gap/i.test(String(lab)))
        bpiSeries.push({label:String(lab).trim(),values:bpiCols.map(c=>xlsNum(b.cell(r,c)))});
    }
    bpi={title:(b.cell(1,1)&&String(b.cell(1,1)).trim())||'BPI',months:bpiMonths,series:bpiSeries};
  }
  /* ---- base: 첫 문항(A1 등)의 월별 사례수 ---- */
  let base=[];
  const a1=blocks.find(x=>/^A1\./.test(x.name))||blocks.find(x=>x.sample&&x.months.length>=12);
  if(a1&&a1.sample){a1.months.forEach((mm,idx)=>{const n=a1.sample.values[idx];if(mm&&n!=null)base.push({month:mm,n:Math.round(n)});});}
  return {blocks,bpi,base,meta:{source:'업로드된 엑셀',n_blocks:blocks.length}};
}

function parseSchedule(str,baseYear){

  str=String(str).trim();
  /* support both ~ and - as range separators (e.g. "25.02~25.04" or "25.02-25.04") */
  const parts=str.split(/[~～\-]/);
  const left=parts[0].trim();
  const right=(parts[1]||'').trim();
  function toYMD(tok,defYear){
    if(!tok)return null;
    const seg=tok.split('.').map(x=>x.trim()).filter(x=>x!=='');
    if(seg.length>=3)return {ym:fullYear(seg[0])*12+(+seg[1]), day:(+seg[2]||null)};   /* year.month.day */
    if(seg.length===2){
      const a=+seg[0], b=+seg[1];
      if(a>=16&&a<=40)return {ym:fullYear(a)*12+b, day:null};   /* year.month */
      return {ym:defYear*12+a, day:(b||null)};                  /* month.day */
    }
    if(seg.length===1)return {ym:defYear*12+(+seg[0]), day:null};
    return null;
  }
  const L=toYMD(left,baseYear);
  const startYM=L?L.ym:null, startDay=L?L.day:null;
  const R=right?toYMD(right, Math.floor((startYM||baseYear*12)/12)):null;
  let endYM=R?R.ym:null; const endDay=R?R.day:null;
  /* 연도 표기 없이 해를 넘기는 일정(예: "11.19~1.31")은 종료월이 시작월보다 앞서므로 다음 해로 보정 */
  if(endYM!=null&&startYM!=null&&endYM<startYM)endYM+=12;
  return {startYM,endYM,startDay,endDay};
}

/* 알바몬 대시보드 캠페인 파서: 캠페인 파일의 '알바몬' 시트(두 번째 시트)를 사용한다.
   각 브랜드 블록은 '연도/연도 확인/구분' 행 바로 아래에 '일정' 행이 오는 구조라서
   '일정' 행을 기준(anchor)으로 잡아, 바로 위 행에서 연도, 아래 행들에서 캠페인 종류/명/매체비를 읽는다.
   ('연도' 라벨 위치가 잡코리아 시트와 달라도 동작하도록 일정-기준 방식 사용) */
function parseCampaignWorkbook(wb){
  const out=[];
  const PREFER='알바몬';
  const sheetName = wb.SheetNames.find(s=>String(s).trim()===PREFER)
    || wb.SheetNames.find(s=>{const u=String(s).toUpperCase();return u!=='TABLE'&&u!=='BPI';})
    || wb.SheetNames[0];
  if(!sheetName||!wb.Sheets[sheetName])return out;
  const ws=sheetAccessor(wb.Sheets[sheetName]);
  const {cell,maxRow,maxCol}=ws;
  const isLabelB=(x)=>x==null||['연도','연도 확인','구분','브랜드',''].includes(String(x).trim());
  for(let r=1;r<=maxRow;r++){
    if(String(cell(r,3)||'').trim()!=='일정')continue;
    /* 연도 행 = '일정' 행 바로 위 */
    const yr=r-1;
    const years=[];for(let c=4;c<=maxCol;c++)years.push(cell(yr,c));
    /* 브랜드명: '일정' 행 B열, 없으면 연도 행 등 위쪽 행 B열에서 탐색 */
    let brand=cell(r,2);
    if(isLabelB(brand)){for(let k=r-1;k>=1&&k>=r-3;k--){const b=cell(k,2);if(!isLabelB(b)){brand=b;break;}}}
    const sched=[];for(let c=4;c<=maxCol;c++)sched.push(cell(r,c));
    let types=[],names=[],costs=[];
    for(let rr=r+1;rr<=Math.min(maxRow,r+5);rr++){
      const l=String(cell(rr,3)||'').trim();
      if(l==='일정')break;
      if(l==='캠페인 종류'){types=[];for(let c=4;c<=maxCol;c++)types.push(cell(rr,c));}
      else if(l==='캠페인명'){names=[];for(let c=4;c<=maxCol;c++)names.push(cell(rr,c));}
      else if(l==='매체비'){costs=[];for(let c=4;c<=maxCol;c++)costs.push(cell(rr,c));}
    }
    years.forEach((yv,i)=>{
      const sc=sched[i], nm=names[i];
      if(!sc||!nm)return;
      const baseYear=fullYear(yv||String(sc).split('.')[0]);
      const rng=parseSchedule(sc,baseYear);
      if(!rng||rng.startYM==null)return;
      out.push({brand:String(brand||sheetName).trim(),
        startYM:rng.startYM,endYM:rng.endYM,startDay:rng.startDay,endDay:rng.endDay,
        type:types[i]?String(types[i]).trim():'',
        name:String(nm).trim(),
        cost:costs[i]?String(costs[i]).trim():'',
        schedRaw:String(sc).trim()});
    });
  }
  return out;
}

/* Defense-in-depth: strip any non-"OO년 OO월" entry (a stray '연도' label, bare year, '전체', etc.)
   out of every block's months list, keeping every series/sample value array aligned by index.
   Applied to EVERY data source (embedded window.__DATA__, GitHub-fetched data.json, manual Excel
   upload) so a stale/old-format data.json can never resurrect the bug in the period dropdown. */
function sanitizeBlocks(blocks){
  const monthRe=/^\d+\s*년\s*\d+\s*월$/;
  (blocks||[]).forEach(b=>{
    if(!b||!Array.isArray(b.months))return;
    const keepIdx=[];
    b.months.forEach((m,i)=>{if(typeof m==='string'&&monthRe.test(m.trim()))keepIdx.push(i);});
    if(keepIdx.length===b.months.length)return; /* already clean, nothing to strip */
    b.months=keepIdx.map(i=>b.months[i]);
    if(b.sample&&Array.isArray(b.sample.values))b.sample.values=keepIdx.map(i=>b.sample.values[i]);
    (b.series||[]).forEach(s=>{if(Array.isArray(s.values))s.values=keepIdx.map(i=>s.values[i]);});
  });
  return blocks;
}

/* weighted mean for an 0~10-point block lacking a precomputed MEAN row */
const _meanCache=new WeakMap();
function computedMean10(b){
  if(_meanCache.has(b))return _meanCache.get(b);
  const rows=b.series.filter(s=>/^\(\d+\)/.test(s.label)).map(s=>({k:+s.label.match(/^\((\d+)\)/)[1],values:s.values}));
  if(!rows.length){_meanCache.set(b,null);return null;}
  const n=b.months.length;
  const values=[];
  for(let i=0;i<n;i++){
    let sum=0,wsum=0,any=false;
    rows.forEach(r=>{const v=r.values[i];if(v!=null){sum+=r.k*v;wsum+=v;any=true;}});
    values.push(any&&wsum>0?sum/wsum*1:(any?0:null));

  _meanCache.set(b,row);return row;
}

  const chartW=chEl.offsetWidth; if(chartW<100){strip.style.height='0px';return;}
  const GRID_L=48, GRID_R=24, CHART_PAD=8, CAMP_MARGIN=8;
  const gridW=chartW-CHART_PAD*2-GRID_L-GRID_R;
  const N=e-s+1;
  const startYM=monthLabelToYM(months[s]), endYM=monthLabelToYM(months[e]);
  const visYMs=[];
  for(let i=s;i<=e;i++)visYMs.push(monthLabelToYM(months[i]));
  const dataLastYM=monthLabelToYM(months[months.length-1])||endYM;
  let boundaryGap=false;
  try{boundaryGap=chartInst.getOption()?.xAxis?.[0]?.boundaryGap===true;}catch(_){}

  /* Get exact pixel x-positions for each visible month directly from ECharts.
     Force resize first to ensure chart knows its current container dimensions. */
  try{chartInst.resize();}catch(_){}
  const monthPx=[];
  let pixelOk=false;
  if(forceMonthPx&&forceMonthPx.length===N){
    /* caller pre-computed month positions (e.g. rank bar charts with custom x-axis) */
    monthPx.push(...forceMonthPx);
    pixelOk=true;
  }else{
    try{
      for(let i=0;i<N;i++)monthPx.push(chartInst.convertToPixel({xAxisIndex:0},i));
      pixelOk=monthPx.length===N
        &&monthPx.every(p=>typeof p==='number'&&isFinite(p))
        &&(N<2||monthPx.some(p=>p!==monthPx[0])); /* all-same = degenerate layout */
    }catch(_){}
  }
  /* Right edge of chart plot area (clamp all shading to this) */
  const rightEdgePx=pixelOk&&N>0
    ?(boundaryGap&&N>=2?monthPx[N-1]+(monthPx[N-1]-monthPx[N-2])/2:monthPx[N-1])
    :chartW-GRID_R-CAMP_MARGIN;

  /* Map a YM value to its pixel x-position.
     Primary: ECharts convertToPixel (exact). Fallback: math with corrected gridW. */
  function pxForYM(ym){
    const PX_ADJ=8; /* empirical right-shift to align with chart month labels */
    if(pixelOk&&N>0){
      if(ym<=visYMs[0])return monthPx[0]-CAMP_MARGIN+PX_ADJ;
      for(let i=1;i<N;i++){
        if(visYMs[i]===ym)return monthPx[i]-CAMP_MARGIN+PX_ADJ;
        if(visYMs[i]>ym){
          const frac=(ym-visYMs[i-1])/(visYMs[i]-visYMs[i-1]||1);
          return monthPx[i-1]+frac*(monthPx[i]-monthPx[i-1])-CAMP_MARGIN+PX_ADJ;
        }
      }
      if(N>=2){
        const step=(monthPx[N-1]-monthPx[N-2])/(visYMs[N-1]-visYMs[N-2]||1);
        const px=monthPx[N-1]+(ym-visYMs[N-1])*step;
        return Math.min(px,rightEdgePx)-CAMP_MARGIN+PX_ADJ;
      }
      return rightEdgePx-CAMP_MARGIN+PX_ADJ;
    }
    /* Fallback: math formula. gridW = containerW - GRID_L - GRID_R (no CHART_PAD bias) */
    if(N===0)return 0;
    const fW=chEl.offsetWidth||chartW, fgW=Math.max(1,fW-GRID_L-GRID_R);
    let fi=0;
    if(N>=2){
      if(ym<=visYMs[0])fi=0;
      else if(ym>=visYMs[N-1])fi=N-1+(ym-visYMs[N-1])/(visYMs[N-1]-visYMs[N-2]||1);
      else{for(let i=1;i<N;i++){if(visYMs[i]>=ym){fi=(i-1)+(ym-visYMs[i-1])/(visYMs[i]-visYMs[i-1]||1);break;}}}
    }
    const frac=Math.max(0,fi)/(N>1?N-1:1);
    if(boundaryGap){const band=fgW/N;return GRID_L+band*0.5+frac*(fgW-band)-CAMP_MARGIN+PX_ADJ;}
    const pad=fgW*0.03,usable=fgW-pad*2;
    return GRID_L+pad+frac*usable-CAMP_MARGIN+PX_ADJ;
  }
  /* Day-accurate x: place a date within its month by fraction of days.
     start(isEnd=false) → month tick + (day-1)/daysInMonth ; end(isEnd=true) → tick + day/daysInMonth
     (so e.g. 10.28 starts ~28/31 into Oct, and 12.31 ends right at the Jan tick). */
  function daysInMonth(ym){const m=((ym-1)%12)+1, y=(ym-m)/12; const d=new Date(y,m,0).getDate(); return d||30;}
  function pxForDate(ym,day,isEnd){
    if(ym==null)return pxForYM(dataLastYM+1);
    let frac;
    if(day==null)frac=isEnd?1:0;
    else{const dim=daysInMonth(ym); frac=isEnd?Math.min(1,day/dim):Math.max(0,(day-1)/dim);}
    return pxForYM(ym+frac);
  }
  /* shade inside #ch — .card has no position:relative so its overflow:hidden
     does NOT clip absolute children whose containing block is #ch.
     Shade extends upward (negative shadeTop) to cover gapstrip area.        */
  chEl.style.position='relative';
  const shade=document.createElement('div');
  shade.id='campaignShade';
  shade.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:1';
  chEl.appendChild(shade);
  const chartH=chEl.offsetHeight||360;
  const GRID_T=28, GRID_B=54;
  let shadeTop=GRID_T, shadeH=chartH-GRID_T-GRID_B;
  try{
    const gapEl=document.getElementById('gapstrip');
    if(gapEl){
      const gapR=gapEl.getBoundingClientRect(), chR=chEl.getBoundingClientRect();
      /* use gapstrip BOTTOM so shading starts below the Gap numbers row */
      const gapOffset=gapR.bottom-chR.top; /* small negative: just below gapstrip */
      shadeTop=Math.min(GRID_T, gapOffset);
      shadeH=chartH-GRID_B-shadeTop;
    }
  }catch(_){}
  /* ── Group camps by brand, each brand = 1 row ── */
  const brandOrder=[], brandMap={};
  camps.forEach(c=>{
    if(!brandMap[c.brand]){brandMap[c.brand]=[];brandOrder.push(c.brand);}
    brandMap[c.brand].push(c);
  });
  const BADGE_H=20, ROW_GAP=4;
  const nRows=brandOrder.length;
  strip.style.height=(nRows*(BADGE_H+ROW_GAP)+4)+'px';
  strip.style.marginBottom='2px';

  /* ECharts-style tooltip div (shared) */
  let tt=document.getElementById('campTT');
  if(!tt){tt=document.createElement('div');tt.id='campTT';
    tt.style.cssText='display:none;position:fixed;z-index:9999;pointer-events:none;'+
      'background:#fff;border:1px solid #E0DCD2;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);'+
      'padding:10px 14px;min-width:160px;font-size:12px;line-height:1.75;color:#3A4055';
    document.body.appendChild(tt);}

  /* ── Cluster overlapping campaigns within same brand ── */
  function clusterOverlap(arr){
    const sorted=arr.slice().sort((a,b)=>a.startYM-b.startYM);
    const clusters=[];
    sorted.forEach(c=>{
      const cEnd=c.endYM==null?dataLastYM:c.endYM;
      /* try to merge into last cluster that this overlaps */
      let merged=false;
      for(let i=clusters.length-1;i>=0;i--){
        const cl=clusters[i];
        if(c.startYM<=cl.endYM){
          cl.camps.push(c);
          if(cEnd>cl.endYM)cl.endYM=cEnd;
          merged=true;break;
        }
      }
      if(!merged)clusters.push({camps:[c],startYM:c.startYM,endYM:cEnd});
    });
    return clusters;
  }

  const LBL_W=CHART_PAD+GRID_L-4;
  brandOrder.forEach((brand,rowIdx)=>{
    const col=campaignColor(brand,rowIdx);
    const y=rowIdx*(BADGE_H+ROW_GAP);
    /* brand label in left margin */
    const lbl=document.createElement('div');
    lbl.style.cssText=`position:absolute;left:0;top:${y}px;width:${LBL_W}px;height:${BADGE_H}px;`+
      `display:flex;align-items:center;justify-content:flex-end;padding-right:4px;`+
      `font-size:9px;font-weight:700;color:${col.solid};white-space:nowrap;overflow:hidden`;
    lbl.textContent=brand;
    strip.appendChild(lbl);

    const clusters=clusterOverlap(brandMap[brand]);
    clusters.forEach(cl=>{
      /* day-accurate x per campaign: start at start-day, end through end-day (end-day → next tick when day=말일) */
      const segX=cl.camps.map(c=>{
        const cx0=pxForDate(c.startYM,c.startDay,false);
        const effEndYM=c.endYM==null?dataLastYM:c.endYM;
        const effEndDay=c.endYM==null?null:c.endDay;
        const cx1=Math.max(cx0+2,pxForDate(effEndYM,effEndDay,true));
        return {c,x0:cx0,x1:cx1};
      });
      const x0=Math.min.apply(null,segX.map(z=>z.x0));
      const x1=Math.max.apply(null,segX.map(z=>z.x1));
      const totalW=Math.max(4,x1-x0);
      const n=cl.camps.length;
      segX.forEach(z=>{
        const w=Math.max(2,z.x1-z.x0);
        const sh=document.createElement('div');
        sh.style.cssText=`position:absolute;left:${z.x0+CAMP_MARGIN}px;top:${shadeTop}px;width:${w}px;height:${shadeH}px;`+
          `background:rgba(${col.rgb},0.09);`+
          `border-left:1px dashed rgba(${col.rgb},0.55);border-right:1px dashed rgba(${col.rgb},0.55)`;
        shade.appendChild(sh);
      });
      /* one badge, n-divided segments */
      const badge=document.createElement('div');
      badge.style.cssText=`position:absolute;left:${x0}px;top:${y}px;width:${totalW}px;height:${BADGE_H}px;`+
        `box-sizing:border-box;display:flex;background:${col.soft};border:0.5px solid ${col.solid};border-radius:6px;overflow:hidden;cursor:default`;
      cl.camps.forEach((c,ci)=>{
        const seg=document.createElement('div');
        const segW=totalW/n;
        seg.style.cssText=`flex:0 0 ${segW}px;width:${segW}px;height:100%;`+
          `display:flex;align-items:center;padding:0 5px;overflow:hidden;box-sizing:border-box;`+
          (ci<n-1?`border-right:0.5px solid rgba(${col.rgb},0.35);`:'');
        seg.innerHTML=`<span style="font-size:9.5px;color:${col.solid};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</span>`;
        /* individual segment tooltip */
        const ttHTML=`<div style="font-weight:700;color:${col.solid};margin-bottom:4px">${c.brand}</div>`+
          `<div><span style="color:#888">캠페인명</span>&nbsp;&nbsp;${c.name}</div>`+
          `<div><span style="color:#888">종류</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${c.type||'–'}</div>`+
          `<div><span style="color:#888">일정</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${c.schedRaw}</div>`+
          `<div><span style="color:#888">매체비</span>&nbsp;&nbsp;&nbsp;&nbsp;${c.cost||'–'}</div>`;
        seg.addEventListener('mouseenter',()=>{
          tt.innerHTML=ttHTML;tt.style.display='block';
          const r=seg.getBoundingClientRect();
          tt.style.left=Math.min(r.left,window.innerWidth-200)+'px';
          tt.style.top=(r.top-tt.offsetHeight-8)+'px';
        });
        seg.addEventListener('mouseleave',()=>{tt.style.display='none';});
        badge.appendChild(seg);
      });
      strip.appendChild(badge);
    });
  });
}

/* Populate gap cells aligned to chart x-axis - called after chart renders */
function renderAlignedGap(chartInst,allMonths,s,e,gapRows,useMath){
  const validRows=gapRows.filter(r=>r&&r.values);
  if(!validRows.length)return;

  function doAlign(){
    const cellsArea=document.getElementById('gapCells');
    if(!cellsArea||!chartInst)return;
    if(typeof chartInst.getDom!=='function')return;
    const chartEl=chartInst.getDom();
    if(!chartEl)return;
    const chartW=chartEl.offsetWidth;
    if(chartW<100)return;
    const CELLS_PAD=24, GRID_L=48, GRID_R=24, CHART_PAD=8;
    const gridW=chartW-CHART_PAD*2-GRID_L-GRID_R;
    const N=e-s+1;
    let boundaryGap=false;
    try{const opt=chartInst.getOption();boundaryGap=opt?.xAxis?.[0]?.boundaryGap===true;}catch(_){}
    /* Prefer exact pixel positions from ECharts; fall back to math if unavailable */
    let usePixel=false, pxOffset=0, pxAt=null;
    try{
      if(!useMath&&typeof chartInst.convertToPixel==='function'){
        const test=chartInst.convertToPixel({xAxisIndex:0},0);
        if(typeof test==='number'&&isFinite(test)){
          usePixel=true;
          /* gapCells left edge is CELLS_PAD right of chart-canvas left edge */
          pxOffset=-CELLS_PAD;
          pxAt=(li)=>chartInst.convertToPixel({xAxisIndex:0},li);
        }
      }
    }catch(_){usePixel=false;}
    function catX(li){
      if(usePixel){return pxOffset+pxAt(li);}
      if(boundaryGap){return CHART_PAD+GRID_L+(li+0.5)*gridW/N;}
      const pad=gridW*0.03, usable=gridW-pad*2;
      return CHART_PAD+GRID_L+pad+(N>1?li*usable/(N-1):usable/2);
    }
    const offsetX=0;
    const ROW_H=34;
    const showRowLabel=validRows.length>1;
    cellsArea.style.height=(validRows.length*ROW_H+4)+'px';
    cellsArea.innerHTML='';
    if(showRowLabel){
      validRows.forEach((row,ri)=>{
        const m=(row.label||'').match(/\(([^)]+)\)/);
        let txt=m?m[1]:(row.label||'');
        /* wrap long labels onto two lines to avoid clashing with values */
        let disp=txt;
        if(txt==='1+2+3순위')disp='1+2+3<br>순위';
        else if(txt==='알바천국')disp='알바<br>천국';
        const lbl=document.createElement('div');
        lbl.style.cssText=`position:absolute;left:0;top:${ri*ROW_H}px;height:${ROW_H}px;`+
          `display:flex;align-items:center;font-size:9.5px;font-weight:700;color:var(--ink2);`+
          `line-height:1.15;white-space:nowrap;z-index:2`;
        lbl.innerHTML=disp;
        cellsArea.appendChild(lbl);
      });
    }
    /* Value cells (same row as label) */
    for(let gi=s;gi<=e;gi++){
      const absX=offsetX+catX(gi-s);
      validRows.forEach((row,ri)=>{
        const v=row.values[gi];
        const cell=document.createElement('div');
        cell.style.cssText=`position:absolute;left:${absX}px;top:${ri*ROW_H}px;transform:translateX(-50%);text-align:center;min-width:30px`;
        const cls=v==null?'':v>0.05?'up':v<-0.05?'down':'flat';
        cell.innerHTML=`<div style="font-size:9px;color:var(--soft)">${shortM(allMonths[gi])}</div>`+
          `<div class="tnum ${cls}" style="font-size:10.5px;font-weight:700;line-height:1.5">${v==null?'–':(v>0?'+':'')+v.toFixed(1)}</div>`;
        cellsArea.appendChild(cell);
      });
    }
  }
  /* RAF → setTimeout(0): waits for full browser layout+paint cycle before measuring */
  requestAnimationFrame(()=>setTimeout(doAlign,0));
}

/* Chart type as <select> - merges stack sub-modes */
function ctSelectHTML(recommended,vs){
  const recLabel={'line':'꺾은선','bar':'세로막대','stack':'누적세로막대','pie':'파이','radar':'방사형'}[recommended]||'추천';
  const curVal=vs.isRec?'rec':(vs.ct==='stack'?(vs.stackMode==='normal'?'stack_normal':'stack_pct'):vs.ct);
  const opts=[
    {v:'rec',t:'★ 추천 ('+recLabel+')'},
    {v:'line',t:'꺾은선'},
    {v:'bar',t:'세로막대'},
    {v:'stack_pct',t:'100% 누적세로막대'},
    {v:'stack_normal',t:'누적세로막대 (기본)'},
    {v:'pie',t:'파이'},
    {v:'radar',t:'방사형'},
  ];
  return opts.map(o=>`<option value="${o.v}" ${o.v===curVal?'selected':''}>${o.t}</option>`).join('');
}
function wireCtSelect(root,vs,recommended,onChange){
  /* Try root.querySelector first, fall back to document-wide search */
  const sel=(root&&root.querySelector?root.querySelector('#ctSel'):null)||document.getElementById('ctSel');
  if(!sel)return;
  /* Remove any previous listener by cloning and replacing */
  const fresh=sel.cloneNode(true);
  sel.parentNode.replaceChild(fresh,sel);
  fresh.addEventListener('change',()=>{const v=fresh.value;
    if(v==='rec'){vs.ct=recommended;vs.isRec=true;}
    else if(v==='stack_pct'){vs.ct='stack';vs.stackMode='pct';vs.isRec=false;}
    else if(v==='stack_normal'){vs.ct='stack';vs.stackMode='normal';vs.isRec=false;}
    else{vs.ct=v;vs.isRec=false;}
    onChange();});
}

    else vs.hidden.clear();

function periodCtrlHTML(months,ct,vs){

function mkSeries(list,months,type,opts){
  opts=opts||{};
  const avgVal=s=>{const vs2=s.values.filter(v=>v!=null);return vs2.length?vs2.reduce((a,c)=>a+c,0)/vs2.length:0;};
  const avgMap=list.map((s,i)=>({i,avg:avgVal(s)})).sort((a,b)=>b.avg-a.avg)
    .reduce((r,{i},rank)=>{r[i]=list.length-rank;return r;},{});

  /* ---- Explicit label visibility rule ----
     For each month (x position), sort brand values descending; walking down,
     keep a label only if it's at least MIN_GAP (%p) below the last KEPT label.
     Bold brands (알바몬/알바천국) are always kept. Values too close to a
     higher already-shown value are suppressed (lower value hidden first). */
  const nMonths=months.length;
  const MIN_GAP=(()=>{
    /* dynamic threshold: more brands shown → need larger gap to avoid clutter */
    const shown=list.length;
    if(shown<=3)return 0;        /* few brands: show all */
    if(shown<=5)return 1.5;
    if(shown<=8)return 2.5;
    return 3.5;                   /* many brands: stricter */
  })();
  /* labelShow[seriesIdx][monthIdx] = boolean */
  const labelShow=list.map(()=>new Array(nMonths).fill(true));
  if(MIN_GAP>0){
    for(let m=0;m<nMonths;m++){
      /* gather (seriesIdx, value, bold) for this month */
      const pts=[];
      list.forEach((s,si)=>{
        const v=s.values[m];
        if(v==null||v===0)return;
        pts.push({si,v,bold:isBoldLabel(s.label)});
      });
      pts.sort((a,b)=>b.v-a.v); /* high → low */
      let lastKept=Infinity;
      pts.forEach(p=>{
        if(p.bold){ /* always show, and it resets the reference line */
          labelShow[p.si][m]=true; lastKept=p.v; return;
        }
        if(lastKept-p.v>=MIN_GAP){ labelShow[p.si][m]=true; lastKept=p.v; }
        else { labelShow[p.si][m]=false; } /* too close to a higher shown value */
      });
    }
  }

  return list.map((s,i)=>{
    const bold=isBoldLabel(s.label),der=isDeriv(s.label),c=pickColor(s.label,i,opts,s._oi);
    const zVal=bold?(s.label.includes(JK)?200:s.label.includes(SR)?190:180+i):(avgMap[i]||1);
    if(type==='bar'){
      const data=s.values.map((v,m)=>({value:v,label:{show:labelShow[i][m]}}));
      return {name:s.label,type:'bar',data,itemStyle:{color:c,borderRadius:[2,2,0,0]},
        barMaxWidth:61,emphasis:{focus:'series'},z:bold?10:1,
        labelLayout:{hideOverlap:false,moveOverlap:'shiftY'},
        label:{show:true,position:'top',fontSize:bold?10:9,color:c,fontWeight:bold?700:500,
          formatter:p=>p.value==null?'':(+p.value).toFixed(1)}};
    }
    /* Line null-handling: only a genuinely missing value (null) breaks the line.

    return {name:s.label,type:'line',data,connectNulls:false,smooth:false,
      symbol:'circle',symbolSize:bold?5:3,showSymbol:true,
      lineStyle:{width:bold?3.2:der?2:1.6,type:der?'dashed':'solid',color:c},itemStyle:{color:c},
      emphasis:{focus:'series'},z:zVal,
      labelLayout:{hideOverlap:false,moveOverlap:'shiftY'},
      label:{show:true,fontSize:bold?10:9,color:c,fontWeight:bold?700:400,

}
function pickColor(label,i,opts,oi){

/* Ordering for vertical-bar / stacked charts (and their tooltips):
   알바몬 first (when it exists as a series), then the rest sorted by the most recent

function latestVal(s){for(let i=s.values.length-1;i>=0;i--){if(s.values[i]!=null)return s.values[i];}return -Infinity;}
function orderSeries(list){
  const arr=list.map((s,i)=>({...s,_oi:(s._oi==null?i:s._oi)}));

  let jk=null;

  const valueStyle='font-size:14px;color:#666;font-weight:900';

    let ps=params.filter(p=>p.seriesName!=='_w'&&!(opts.skip&&opts.skip(p)));
    ps=ps.slice().sort((a,b)=>{

        if(val==null&&p.data!=null){val=(typeof p.data==='object')?p.data.value:p.data;}
      }

      return `<div style="margin: 10px 0 0;line-height:1;">${inner}${clr}</div>`;}).join('');

function drawStackOpt(months,seriesList,opts){

     When opts.fixedOrder is set, keep the caller's exact order (scale views stack by scale order). */
  let rank;
  if(!opts.fixedOrder){seriesList=orderSeries(seriesList);rank=rankMap(seriesList);}
  else{seriesList=seriesList.map((s,i)=>({...s,_oi:(s._oi==null?i:s._oi)}));
    rank={};seriesList.forEach((s,i)=>{rank[s.label]=i;});}

  /* 100% 누적세로막대:
     - 막대의 '높이'(축 위치)만 100% 기준으로 정규화한다.
     - 데이터 레이블과 툴팁은 반드시 '원본 %'를 보여준다.
     각 데이터 포인트를 {value: 정규화높이, orig: 원본값} 형태로 만들어,

  const totals=[];

    const len=seriesList[0]?.values?.length||0;
    for(let i=0;i<len;i++){
      totals[i]=seriesList.reduce((sum,s)=>{const v=s.values[i];return sum+(v!=null?Math.abs(v):0);},0);
    }
  }
  const dataFor=(s)=>s.values.map((v,i)=>{
    if(v==null)return null;

    return {value:v, orig:v};
  });
  const origOf=(p)=>{const d=p.data; const o=(d&&typeof d==='object')?d.orig:d; return o;};

  const ser=seriesList.map((s,i)=>({name:s.label,type:'bar',stack:'a',data:dataFor(s),
    barMaxWidth:61,itemStyle:{color:pickColor(s.label,i,opts,s._oi)},
    labelLayout:{hideOverlap:true,moveOverlap:'shiftY'},
    label:{show:opts.percentLike!==false,position:'inside',fontSize:9,color:'#fff',fontWeight:600,
      formatter:p=>{const o=origOf(p); if(o==null)return ''; const h=(p.value!=null?Math.abs(+p.value):0); return h>=(isPct?3:0.5)?(+o).toFixed(1)+'%':'';}}}));
  if(opts.overlay){
    ser.push({name:opts.overlay.label,type:'bar',stack:'a',data:months.map(()=>0),tooltip:{show:false},itemStyle:{color:'transparent'},
      label:{show:true,position:'top',distance:6,fontSize:10,color:'#14182A',fontWeight:700,
        formatter:p=>{const v=opts.overlay.values[p.dataIndex];return v==null?'':v.toFixed(1)+(opts.overlay.unit||'')}}});
  }

      const t=seriesList.reduce((sum,s)=>{const v=s.values[i];return sum+(v!=null?v:0);},0);
      if(t>maxTotal)maxTotal=t;
    }
    yMax=maxTotal>0?Math.ceil((maxTotal-0.001)/10)*10:undefined;
    if(opts.yMax)yMax=opts.yMax; /* explicit override (e.g. scale summary overlay headroom) */
  }
  /* tooltip: rows ordered 알바몬 first then latest-month desc (same as stack order);
     pct mode shows the original % (not the normalized height). overlay row is skipped. */
  const skipOverlay=p=>opts.overlay&&p.seriesName===opts.overlay.label;
  const baseOpt={
    grid:{left:48,right:24,top:30,bottom:54},
    tooltip:{trigger:'axis',confine:true,
      formatter:orderedAxisTooltipFormatter(rank,{dec:1,unit:'%',skip:skipOverlay,
        valTx:isPct?(p=>origOf(p)):undefined})},
    legend:{type:'scroll',bottom:0,icon:'roundRect',itemWidth:12,itemHeight:8,itemGap:10,textStyle:{fontSize:10.5,color:'#3A4055'}},
    graphic:[unitBadge(opts.unitLabel)],
    xAxis:{type:'category',data:months,axisLabel:{fontSize:10.5,color:'#6B7186',hideOverlap:true},axisLine:{lineStyle:{color:'#E0DCD2'}},axisTick:{show:false}},
    yAxis:{type:'value',max:yMax,min:0,
      axisLabel:{fontSize:10.5,color:'#6B7186',formatter:'{value}%'},

/* Labels that are not real brands (aggregate/other buckets) — excluded from top-N default */
function isNonBrand(label){
  return /^(기타|없음|모름|없음\/모름|해당\s*없음|무응답|전체|계)$/.test((label||'').trim())
      || (label||'').includes('없음')||(label||'').includes('모름');
}
/* Default brand selection: show only the top-N brands ranked by the most-recent
   non-null month value; hide the rest. Derived/aggregate/non-brand rows ignored.
   Bold brands (알바몬/알바천국) are always shown. */
function applyTop5Default(seriesList,months,vs,topN){
  topN=topN||5;
  const opts=seriesList.filter(s=>!isDeriv(s.label)&&!isNonBrand(s.label));
  if(opts.length<=topN)return;
  let mIdx=-1;
  for(let m=months.length-1;m>=0;m--){
    if(opts.some(s=>s.values[m]!=null&&s.values[m]!==0)){mIdx=m;break;}
  }
  if(mIdx<0)return;
  const ranked=opts.map(s=>({label:s.label,v:(s.values[mIdx]==null?-Infinity:s.values[mIdx]),
      bold:isBoldLabel(s.label)}))
    .sort((a,b)=>b.v-a.v);
  const keep=new Set();
  ranked.slice(0,topN).forEach(r=>keep.add(r.label));
  ranked.forEach(r=>{if(r.bold)keep.add(r.label);});
  /* hide everything not kept — including non-brand buckets */
  seriesList.filter(s=>!isDeriv(s.label)).forEach(s=>{if(!keep.has(s.label))vs.hidden.add(s.label);});
}

function renderView(v){
  vs={ct:v.recommended||'line',isRec:true,unit:(v.metrics&&v.metrics[0])||'%',month:null,rs:null,re:null,
      hidden:new Set(),selAttr:null,attrHidden:new Set(),rankSel:{r1:true,r123:v.recommended==='bar'},tabIdx:0,stackMode:'pct',showGap:true,showCampaign:true};
  const m=document.getElementById('main');
  const displayTitle=v.title.replace(/^(SQ|[A-Z])\d+[a-z]?\.\s*/,'');
  m.innerHTML=`<div class="crumb"><span class="pill">${v.section}</span><span>${v.fmt||''}</span></div>
    <h2 class="qt">${displayTitle}</h2><div id="vbody"></div>`;
  const R={pie_month:vStack,trend_filter:vTrend,scale_combined:vScale,summary_combined:vSummary,
    rank_pair:vRank,stack_or_pie:vStack,radar_one:vRadarOne,bpi:vBPI}[v.type];
  (R||vTrend)(v);
  /* Inject survey question note after paint() */
  const qtext=SURVEY_Q[v.title];
  if(qtext){
    const card=document.querySelector('#vbody .card');
    if(card){const el=document.createElement('div');el.className='qnote';el.textContent='📋 '+qtext;card.appendChild(el);}
  }
}

function chipRow(labels,opts){
  const redraw=opts.redraw||opts.rerender||function(){};
  const wrap=document.createElement('div');wrap.className='filters';
  function build(){
    wrap.innerHTML='';
    const lab=document.createElement('span');lab.className='fl-lab';lab.textContent=opts.label||'브랜드';wrap.appendChild(lab);
    (opts.presets||[]).forEach(p=>{const c=document.createElement('span');c.className='chip chip-mini';c.textContent=p.name;
      c.onclick=()=>{p.apply();build();redraw();};wrap.appendChild(c);});
    labels.forEach(l=>{const c=document.createElement('span');
      const on=!opts.hidden.has(l);
      c.className='chip'+(on?' on':' dim')+(l.includes(JK)?' jk':'')+(l.includes(SR)?' sr':'');
      c.textContent=l;
      c.onclick=()=>{
        if(opts.single){opts.hidden.clear();labels.forEach(x=>{if(x!==l)opts.hidden.add(x)});}
        else{if(opts.hidden.has(l))opts.hidden.delete(l);else opts.hidden.add(l);}
        build();redraw();};
      wrap.appendChild(c);});
  }
  build();
  return wrap;
}

function vTrend(v){
  const b=byTitle[v.members[0]]; if(!b){document.getElementById('vbody').innerHTML='<div class="empty">데이터를 찾을 수 없습니다.</div>';return;}
  ensureDefaultRange(vs,b.months);
  const opts=b.series.filter(s=>!isDeriv(s.label));
  const isR28=b.name.startsWith('R28');
  let focus=opts.find(s=>s.label.includes(JK))||opts[0];
  const big=[JK,SR,'인크루트','워크넷','원티드','잡플래닛'];
  if(isR28){
    // 알바몬 패밀리: only 알바몬 복수/단수 visible by default; order them first
    const albaOrder=['알바몬 (복수 응답)','알바몬 (단수 응답)'];
    const rest=opts.map(s=>s.label).filter(l=>!albaOrder.includes(l));
    // reorder opts: 알바몬 복수, 알바몬 단수, then rest
    opts.sort((a,b)=>{const ia=albaOrder.indexOf(a.label),ib=albaOrder.indexOf(b.label);
      if(ia>=0&&ib>=0)return ia-ib;if(ia>=0)return -1;if(ib>=0)return 1;return 0;});
    opts.forEach(s=>{if(!albaOrder.includes(s.label))vs.hidden.add(s.label);});
    focus=opts[0];
  }else applyTop5Default(opts,b.months,vs);
  const jkS=opts.find(s=>s.label.includes(JK)),srS=opts.find(s=>s.label.includes(SR)),cgS=opts.find(s=>s.label.includes(CG));

    const body=document.getElementById('vbody');

        <div class="ctrl-bar">
          <span class="ctrl-label">브랜드</span>${brandDropHTML(opts.map(s=>s.label),vs,'brandDd')}
          <span class="ctrl-sep"></span>
          <span class="ctrl-label">기간</span>${periodCtrlHTML(b.months,vs.ct,vs)}
          <span class="ctrl-sep"></span>
          <span class="ctrl-label">차트 형태</span><select class="msel" id="ctSel">${ctSelectHTML(v.recommended,vs)}</select>
          <button class="btn" id="campTogBtn">캠페인</button><button class="btn" id="gapTogBtn">경쟁사 Gap</button><button class="btn" id="png">PNG</button>
        </div>
        ${campaignStripHTML()}
        ${gapStripHTML(v.section,vs.ct,b.months,vs.rs,vs.re,gapRowsTwo(jkS,srS,cgS,'%'))}
        <div class="chart" id="ch"></div>
        <div class="note" id="nt"></div>
      </div>${tableCard(b)}`;
    wireBrandDrop(body,opts.map(s=>s.label),vs,draw,'brandDd');
    wirePeriod(body,b.months,vs.ct,vs,draw);
    wireCtSelect(body,vs,v.recommended,()=>{paint();});
    document.getElementById('png').onclick=()=>dlPNG(chart);
    (()=>{
      const gTog=document.getElementById('gapTogBtn');
      const cTog=document.getElementById('campTogBtn');
      function styleBtn(btn,on){if(!btn)return;
        btn.classList.remove('btn-on');btn.style.opacity=on?'1':'0.4';btn.style.color=on?'':'var(--soft)';}
      if(gTog){
        const gs=document.getElementById('gapstrip');
        if(!gs){gTog.style.display='none';}
        else{styleBtn(gTog,vs.showGap);gs.style.display=vs.showGap?'':'none';
          gTog.onclick=()=>{vs.showGap=!vs.showGap;styleBtn(gTog,vs.showGap);

        if(!cs||!CAMPAIGNS.length){cTog.style.display='none';}

            document.getElementById('campstrip').style.display=vs.showCampaign?'':'none';
            const sh=document.getElementById('campaignShade');if(sh)sh.style.display=vs.showCampaign?'':'none';
            if(vs.showCampaign){
              if(sh){/* shade exists, just show it — no full re-render needed */}
              else{renderView(CFG.views[state.view]);
                /* after re-render, enforce gap state so it isn't inadvertently reset */
                const gs2=document.getElementById('gapstrip'),gt2=document.getElementById('gapTogBtn');
                if(!vs.showGap){if(gs2)gs2.style.display='none';if(gt2){gt2.classList.remove('btn-on');gt2.style.opacity='0.4';gt2.style.color='var(--soft)';}}
              }

    })();

    wireTable(b);

  }
  function draw(){

      const ms=b.months.slice(vs.rs,vs.re+1);

      nt.innerHTML='';
    }
    renderAlignedGap(chart,b.months,vs.rs,vs.re,gapRowsTwo(jkS,srS,cgS,'%'));
    {const campBrands=CAMPAIGNS.length?[...new Set(CAMPAIGNS.map(c=>c.brand))]:[];
     /* R28 알바몬 패밀리: always show every brand's campaigns, independent of the brand dropdown selection */
     const visL=isR28?campBrands:shown.map(s=>s.label);
     renderCampaignOverlay(chart,b.months,vs.rs,vs.re,visL,vs.ct);}
  }
  paint();
}

/* ============ SCALE (brand metric trend: A13/B3/C1/C3, 5점·0~10점 척도) ============ */
function vScale(v){
  const blocks=v.members.map(t=>byTitle[t]).filter(Boolean);
  if(!blocks.length){document.getElementById('vbody').innerHTML='<div class="empty">데이터를 찾을 수 없습니다. (이번 달 테이블에 해당 문항이 없습니다)</div>';return;}
  const brands=blocks.map(b=>({brand:brandOf(b.title),b}));
  const big=[JK,SR,'인크루트','워크넷','원티드','잡플래닛'];
  /* default: top-5 brands by most recent non-null value of the primary metric */
  (function(){
    if(brands.length<=5)return;
    const refUnit0=hasMean(brands[0].b)?'Top2%':(hasMean10(brands[0].b)?'Top5%':'Top2%');
    const rows=brands.filter(x=>!isNonBrand(x.brand)).map(x=>{
      const r=metricRow(x.b,refUnit0)||metricRow(x.b,'Top2%');
      const vals=r?r.values:[];
      let lv=-Infinity;
      for(let m=vals.length-1;m>=0;m--){if(vals[m]!=null){lv=vals[m];break;}}
      return {brand:x.brand,v:lv,bold:isBoldLabel(x.brand)};
    }).sort((a,b)=>b.v-a.v);
    const keep=new Set();
    rows.slice(0,5).forEach(r=>keep.add(r.brand));
    rows.forEach(r=>{if(r.bold)keep.add(r.brand);});
    brands.forEach(x=>{if(!keep.has(x.brand))vs.hidden.add(x.brand);});
  })();
  const jk=brands.find(x=>x.brand.includes(JK)),sr=brands.find(x=>x.brand.includes(SR)),cg=brands.find(x=>x.brand.includes(CG));
  const refB=jk?jk.b:brands[0].b;
  const hM=hasMean(refB), hN=hasNPS(refB), hM10=!hM&&hasMean10(refB);
  const months=brands[0].b.months;
  ensureDefaultRange(vs,months);
  function paint(){
    const enabled=unitsFor(v.fmt,vs.ct,hM,hN,hM10,v.fmt==='5점 척도');
    if(!enabled.includes(vs.unit))vs.unit= vs.ct==='stack' ? (enabled.includes('%')?'%':enabled[0]) : enabled[0];
    const meanKey=hM10?'11점평균':'5점평균';
    const focusUnit=vs.unit==='%'?'Top2%':vs.unit;
    const focusRow=jk?metricRow(jk.b,focusUnit):null;
    /* 척도 문항 + 누적세로막대(100%/기본): 브랜드 단일 선택, 단위 선택 숨김, 평균 항상 표시
       (5점 척도 → 5점 평균, 0~10점 추천의향 → 11점 평균) */
    const scaleStack=(v.type==='scale_combined'&&vs.ct==='stack');
    const body=document.getElementById('vbody');
    body.innerHTML=(focusRow?kpiHTML('알바몬 '+focusUnit,focusRow,months,focusUnit.includes('평균')?'점':focusUnit==='NPS'?'':'%',1,jk?jk.b.years:null):'')+`
      <div class="card">
        <div class="ctrl-bar">
          <span class="ctrl-label">브랜드</span>${brandDropHTML(brands.map(x=>x.brand),vs,'brandDd',scaleStack)}
          <span class="ctrl-sep"></span>
          <span class="ctrl-label">기간</span>${periodCtrlHTML(months,vs.ct,vs)}
          <span class="ctrl-sep"></span>
          <span class="ctrl-label">차트 형태</span><select class="msel" id="ctSel">${ctSelectHTML(v.recommended,vs)}</select>
          ${scaleStack?'':`<span class="ctrl-sep"></span>${unitSegHTML(enabled)}`}
          <button class="btn" id="campTogBtn">캠페인</button><button class="btn" id="gapTogBtn">경쟁사 Gap</button><button class="btn" id="png">PNG</button>
        </div>
        ${campaignStripHTML()}
        ${gapStripHTML(v.section,vs.ct,months,vs.rs,vs.re,gapRowsTwo(jk&&jk.b,sr&&sr.b,cg&&cg.b,focusUnit))}
        <div class="chart" id="ch"></div>
        <div class="note" id="nt"></div>
      </div>${tableCardMulti(brands.map(x=>x.b),v.title)}`;
    wireBrandDrop(body,brands.map(x=>x.brand),vs,scaleStack?()=>paint():draw,'brandDd',scaleStack);
    if(!scaleStack)wireUnSeg(body,vs,enabled,()=>{draw();});
    wirePeriod(body,months,vs.ct,vs,draw);
    wireCtSelect(body,vs,v.recommended,()=>{paint();});
    document.getElementById('png').onclick=()=>dlPNG(chart);
    (()=>{
      const gTog=document.getElementById('gapTogBtn');
      const cTog=document.getElementById('campTogBtn');
      function styleBtn(btn,on){if(!btn)return;
        btn.classList.remove('btn-on');btn.style.opacity=on?'1':'0.4';btn.style.color=on?'':'var(--soft)';}
      if(gTog){
        const gs=document.getElementById('gapstrip');
        if(!gs){gTog.style.display='none';}
        else{styleBtn(gTog,vs.showGap);gs.style.display=vs.showGap?'':'none';
          gTog.onclick=()=>{vs.showGap=!vs.showGap;styleBtn(gTog,vs.showGap);
            document.getElementById('gapstrip').style.display=vs.showGap?'':'none';};}
      }
      if(cTog){
        const cs=document.getElementById('campstrip');
        if(!cs||!CAMPAIGNS.length){cTog.style.display='none';}
        else{styleBtn(cTog,vs.showCampaign);cs.style.display=vs.showCampaign?'':'none';
          cTog.onclick=()=>{vs.showCampaign=!vs.showCampaign;styleBtn(cTog,vs.showCampaign);
            document.getElementById('campstrip').style.display=vs.showCampaign?'':'none';
            const sh=document.getElementById('campaignShade');if(sh)sh.style.display=vs.showCampaign?'':'none';
            if(vs.showCampaign){
              if(sh){/* shade exists, just show it — no full re-render needed */}
              else{renderView(CFG.views[state.view]);
                /* after re-render, enforce gap state so it isn't inadvertently reset */
                const gs2=document.getElementById('gapstrip'),gt2=document.getElementById('gapTogBtn');
                if(!vs.showGap){if(gs2)gs2.style.display='none';if(gt2){gt2.classList.remove('btn-on');gt2.style.opacity='0.4';gt2.style.color='var(--soft)';}}
              }
            }};}
      }
    })();

    wireTableMulti(brands.map(x=>x.b),v.title,vs);
    draw();
  }
  function draw(){
    const nt=document.getElementById('nt');
    if(vs.ct==='stack'){
      const shown=brands.filter(x=>!vs.hidden.has(x.brand));
      const pick=shown.find(x=>x.brand.includes(JK))||shown[0]||brands[0];
      let optRows=sliceList(pick.b.series.filter(s=>!isDeriv(s.label)),vs.rs,vs.re);
      const isScale=(v.type==='scale_combined');
      /* 척도 문항은 데이터 테이블 순서의 역순으로 쌓아 최고점(매우 호감/10점)이 맨 아래에 오도록 한다.
         데이터 순서: 낮은 점수 → 높은 점수. 역순으로 하면 array[0]=최고점 → 스택 맨 아래. */
      if(isScale)optRows=optRows.slice().reverse();
      /* 평균 오버레이: 5점 척도 → 5점평균, 0~10점(추천의향) → 11점평균, 항상 표시 */
      const meanUnit=hM?'5점평균':(hM10?'11점평균':null);
      const overlayUnit=isScale?meanUnit:(vs.unit==='5점평균'?'5점평균':vs.unit==='11점평균'?'11점평균':vs.unit==='NPS'?'NPS':null);
      const overlayRow=overlayUnit?metricRow(pick.b,overlayUnit):null;
      const overlay=overlayRow?{label:overlayUnit,values:overlayRow.values.slice(vs.rs,vs.re+1),unit:overlayUnit.includes('평균')?'점':''}:null;
      const ms=months.slice(vs.rs,vs.re+1);
      drawStackOpt(ms,optRows,{stackMode:vs.stackMode,unitLabel:'%'+(overlay?' · '+(overlayUnit.includes('평균')?'점':'NPS'):''),overlay,percentLike:true,yMax:112,fixedOrder:isScale});
      const meanTxt=overlayUnit&&overlayUnit.includes('평균')?overlayUnit:'평균';
      nt.innerHTML=isScale?`<span style="font-size:10.5px;color:var(--soft)">${pick.brand} 응답 기준 · 상단 수치는 ${meanTxt}</span>`:'';
    }else{
      const shown=brands.filter(x=>!vs.hidden.has(x.brand));
      const list=shown.map(x=>{const r=metricRow(x.b,vs.unit);return r?{label:x.brand,values:r.values}:null}).filter(Boolean);
      if(vs.ct==='pie'||vs.ct==='radar'){
        drawByType(vs.ct,months,list,{unitLabel:vs.unit.includes('평균')?'점':vs.unit==='NPS'?'':'%',monthIdx:vs.month,stackMode:vs.stackMode});
      }else{
        const ms=months.slice(vs.rs,vs.re+1);
        drawByType(vs.ct,ms,sliceList(list,vs.rs,vs.re),{unitLabel:vs.unit.includes('평균')?'점':vs.unit==='NPS'?'':'%',stackMode:vs.stackMode});
      }
      nt.innerHTML=vs.unit==='NPS'?'<span style="font-size:10.5px;color:var(--soft)">NPS = (9·10점 응답자 비율) − (0~6점 응답자 비율)</span>':'';
    }
    {const focusUnit=vs.unit==='%'?'Top2%':vs.unit;renderAlignedGap(chart,months,vs.rs,vs.re,gapRowsTwo(jk&&jk.b,sr&&sr.b,cg&&cg.b,focusUnit));}
    renderCampaignOverlay(chart,months,vs.rs,vs.re,brands.filter(x=>!vs.hidden.has(x.brand)).map(x=>x.brand),vs.ct);
  }
  paint();
}

/* ============ RANK (1순위 / 1+2+3순위 통합: A14/B4) ============ */
function vRank(v){
  const b1=byTitle[v.members[0]],b3=byTitle[v.members[1]];
  if(!b1&&!b3){document.getElementById('vbody').innerHTML='<div class="empty">데이터를 찾을 수 없습니다. (이번 달 테이블에 해당 문항이 없습니다)</div>';return;}
  const opts=(b1||b3).series.filter(s=>!isDeriv(s.label));
  const big=[JK,SR,'인크루트','워크넷','원티드','잡플래닛'];
  applyTop5Default((b1||b3).series,(b1||b3).months,vs);
  const months=(b1||b3).months;
  ensureDefaultRange(vs,months);
  const jk1=b1&&b1.series.find(s=>s.label.includes(JK)),sr1=b1&&b1.series.find(s=>s.label.includes(SR)),cg1=b1&&b1.series.find(s=>s.label.includes(CG));
  const jk3=b3&&b3.series.find(s=>s.label.includes(JK)),sr3=b3&&b3.series.find(s=>s.label.includes(SR)),cg3=b3&&b3.series.find(s=>s.label.includes(CG));
  function rankPicks(){return Object.keys(vs.rankSel).filter(k=>vs.rankSel[k]);}
  function paint(){
    const focus=opts.find(s=>s.label.includes(JK))||opts[0];
    const fr=b1?b1.series.find(s=>s.label===focus.label):focus;
    const body=document.getElementById('vbody');
    body.innerHTML=(fr?kpiHTML(focus.label+' · 1순위',fr,months,'%',1,b1&&b1.years):'')+`
      <div class="card">
        <div class="ctrl-bar">
          <span class="ctrl-label">브랜드</span>${brandDropHTML(opts.map(s=>s.label),vs,'brandDd')}
          <span class="ctrl-sep"></span>
          <span class="ctrl-label">기간</span>${periodCtrlHTML(months,vs.ct,vs)}
          <span class="ctrl-sep"></span>
          <span class="ctrl-label">차트 형태</span><select class="msel" id="ctSel">${ctSelectHTML(v.recommended,vs)}</select>
          <span class="ctrl-label" style="margin-left:4px">순위</span><div class="seg" id="rkSeg"><button data-k="r1">1순위</button><button data-k="r123">1+2+3순위</button></div>
          <button class="btn" id="campTogBtn">캠페인</button><button class="btn" id="gapTogBtn">경쟁사 Gap</button><button class="btn" id="png">PNG</button>
        </div>
        ${campaignStripHTML()}
        ${gapStripHTML(v.section,vs.ct,months,vs.rs,vs.re,gapRowsTwo(jk3||jk1,sr3||sr1,cg3||cg1,'%'))}
        <div class="chart" id="ch"></div>
        <div class="note" id="nt"></div>
      </div>${tableCardMulti([b1,b3].filter(Boolean),v.title)}`;
    wireBrandDrop(body,opts.map(s=>s.label),vs,draw,'brandDd');
    wirePeriod(body,months,vs.ct,vs,draw);
    wireCtSelect(body,vs,v.recommended,()=>{
      if(vs.ct!=='bar'&&rankPicks().length>1){const keep=vs.rankSel.r1?'r1':'r123';vs.rankSel={r1:keep==='r1',r123:keep==='r123'};}
      if(vs.ct==='bar'){vs.rankSel={r1:true,r123:true};}
      paint();
    });
    const rk=document.getElementById('rkSeg');
    function syncRk(){rk.querySelectorAll('button').forEach(b=>b.classList.toggle('on',vs.rankSel[b.dataset.k]));}
    rk.querySelectorAll('button').forEach(b=>{b.onclick=()=>{
      const k=b.dataset.k;
      if(vs.ct==='bar'){vs.rankSel[k]=!vs.rankSel[k];if(!vs.rankSel.r1&&!vs.rankSel.r123)vs.rankSel[k]=true;}
      else{vs.rankSel={r1:k==='r1',r123:k==='r123'};}
      syncRk();draw();};});
    syncRk();
    document.getElementById('png').onclick=()=>dlPNG(chart);
    (()=>{
      const gTog=document.getElementById('gapTogBtn');
      const cTog=document.getElementById('campTogBtn');
      function styleBtn(btn,on){if(!btn)return;
        btn.classList.remove('btn-on');btn.style.opacity=on?'1':'0.4';btn.style.color=on?'':'var(--soft)';}
      if(gTog){
        const gs=document.getElementById('gapstrip');
        if(!gs){gTog.style.display='none';}
        else{styleBtn(gTog,vs.showGap);gs.style.display=vs.showGap?'':'none';
          gTog.onclick=()=>{vs.showGap=!vs.showGap;styleBtn(gTog,vs.showGap);
            document.getElementById('gapstrip').style.display=vs.showGap?'':'none';};}
      }
      if(cTog){
        const cs=document.getElementById('campstrip');
        if(!cs||!CAMPAIGNS.length){cTog.style.display='none';}
        else{styleBtn(cTog,vs.showCampaign);cs.style.display=vs.showCampaign?'':'none';
          cTog.onclick=()=>{vs.showCampaign=!vs.showCampaign;styleBtn(cTog,vs.showCampaign);
            document.getElementById('campstrip').style.display=vs.showCampaign?'':'none';
            const sh=document.getElementById('campaignShade');if(sh)sh.style.display=vs.showCampaign?'':'none';
            if(vs.showCampaign){
              if(sh){/* shade exists, just show it — no full re-render needed */}
              else{renderView(CFG.views[state.view]);
                /* after re-render, enforce gap state so it isn't inadvertently reset */
                const gs2=document.getElementById('gapstrip'),gt2=document.getElementById('gapTogBtn');
                if(!vs.showGap){if(gs2)gs2.style.display='none';if(gt2){gt2.classList.remove('btn-on');gt2.style.opacity='0.4';gt2.style.color='var(--soft)';}}
              }
            }};}
      }
    })();

    wireTableMulti([b1,b3].filter(Boolean),v.title,vs);
    draw();
  }
  function getVals(blk,l){const r=blk?blk.series.find(s=>s.label===l):null;return r?r.values:months.map(()=>null)}
  function draw(){
    const nt=document.getElementById('nt');
    const shownLabels=opts.map(s=>s.label).filter(l=>!vs.hidden.has(l));
    if(vs.ct==='pie'||vs.ct==='radar'){
      const rankKey=vs.rankSel.r123?'r123':'r1', blk=rankKey==='r123'?b3:b1;
      const list=shownLabels.map(l=>({label:l,values:getVals(blk,l)}));
      drawByType(vs.ct,months,list,{unitLabel:'%',monthIdx:vs.month,stackMode:vs.stackMode});
      nt.innerHTML='';
    }else if(vs.ct==='bar'){
      const ms=months.slice(vs.rs,vs.re+1);
      const both=vs.rankSel.r1&&vs.rankSel.r123;
      const n=shownLabels.length;
      // Flat x-axis: [B1, B2, ..., '', B1, B2, ...] per month
      const cats=[],r1data=[],r3data=[],colorsArr=[];
      ms.forEach((m,mi)=>{
        shownLabels.forEach((l,bi)=>{
          cats.push(''); // blank label; month shown at center via formatter
          const idx=vs.rs+mi;
          r1data.push(getVals(b1,l)[idx]??null);
          r3data.push(getVals(b3,l)[idx]??null);
          colorsArr.push(colorFor(l,bi));
        });
        if(mi<ms.length-1){cats.push(null);r1data.push(null);r3data.push(null);colorsArr.push('transparent');}
      });
      // helper: make a slightly darkened version of a brand color for 1순위
      function darken(c){return c;} // ECharts opacity handles visual darkening

      const labelFmt=()=>({show:true,position:'top',fontSize:9,hideOverlap:true,
        formatter:p=>p.value==null?'':(+p.value).toFixed(1)});
      const ser=[];
      if(both){
        ser.push({name:'1+2+3순위',type:'bar',
          data:r3data.map((v,i)=>({value:v,itemStyle:{color:colorsArr[i],opacity:.28,borderRadius:[2,2,0,0]}})),
          barMaxWidth:44,z:1,labelLayout:{hideOverlap:true},label:{show:false}});
        ser.push({name:'1순위',type:'bar',
          data:r1data.map((v,i)=>({value:v,itemStyle:{color:colorsArr[i],borderRadius:[2,2,0,0]}})),
          barMaxWidth:28,barGap:'-100%',z:2,
          labelLayout:{hideOverlap:true},label:labelFmt()});
      }else if(vs.rankSel.r1){
        ser.push({name:'1순위',type:'bar',
          data:r1data.map((v,i)=>({value:v,itemStyle:{color:colorsArr[i],borderRadius:[2,2,0,0]}})),
          barMaxWidth:44,z:2,labelLayout:{hideOverlap:true},label:labelFmt()});
        /* transparent sibling so ECharts sizes bars same as both-mode */
        ser.push({name:'_w',type:'bar',data:r1data.map(()=>null),barMaxWidth:44,barGap:'-100%',
          silent:true,legendHoverLink:false,tooltip:{show:false},itemStyle:{color:'transparent'}});
      }else{
        ser.push({name:'1+2+3순위',type:'bar',
          data:r3data.map((v,i)=>({value:v,itemStyle:{color:colorsArr[i],opacity:.55,borderRadius:[2,2,0,0]}})),
          barMaxWidth:44,z:1,labelLayout:{hideOverlap:true},label:labelFmt()});
        ser.push({name:'_w',type:'bar',data:r3data.map(()=>null),barMaxWidth:44,barGap:'-100%',
          silent:true,legendHoverLink:false,tooltip:{show:false},itemStyle:{color:'transparent'}});
      }
      // Brand legend: add invisible fake series per brand so legend works like other charts
      const legendData=shownLabels.map((l,i)=>({name:l,icon:'roundRect',
        itemStyle:{color:colorFor(l,i),opacity:1}}));
      // Fake series for legend (all-null, no bars drawn)
      const nullArr=new Array(cats.length).fill(null);
      shownLabels.forEach((l,i)=>{
        ser.push({name:l,type:'bar',data:nullArr,itemStyle:{color:colorFor(l,i)},
          legendHoverLink:false,silent:true,emphasis:{disabled:true}});
      });
      // Month label shown at center of each brand group via x-axis formatter
      const centerPos=Math.floor(n/2);
      if(chart)chart.dispose();chart=initChart('ch');
      chart.setOption({
        grid:{left:48,right:24,top:28,bottom:72},
        tooltip:{trigger:'axis',confine:true,axisPointer:{type:'shadow'},
          formatter:(params)=>{
            if(!params.length)return'';
            const posIdx=params[0].dataIndex;
            if(n===0)return'';
            const mi=Math.floor(posIdx/(n+1)), bi=posIdx%(n+1);
            if(bi>=n)return'';
            const m=ms[mi],bLabel=shownLabels[bi];
            if(!m||!bLabel)return'';
            const mIdx=vs.rs+mi;
            let s=`<b>${m} · ${bLabel}</b><br>`;
            const r1v=getVals(b1,bLabel)[mIdx]; const r3v=getVals(b3,bLabel)[mIdx];
            if(r1v!=null)s+=`1순위: <b>${r1v.toFixed(1)}%</b><br>`;
            if(r3v!=null)s+=`1+2+3순위: <b>${r3v.toFixed(1)}%</b>`;
            return s;
          }},
        legend:{data:legendData,bottom:0,icon:'roundRect',itemWidth:12,itemHeight:8,itemGap:10,textStyle:{fontSize:10.5,color:'#3A4055'},selectedMode:false},
        graphic:[{type:'text',right:8,top:6,style:{text:'단위: %',fontSize:11,fill:'#9098AE',fontWeight:600}}],
        xAxis:{type:'category',data:cats.map(c=>c===null?'':c),boundaryGap:true,
          axisLabel:{fontSize:10.5,color:'#6B7186',interval:0,
            formatter:(v,idx)=>{
              if(n===0)return'';
              const bi=idx%(n+1), mi=Math.floor(idx/(n+1));
              return bi===centerPos&&mi<ms.length? ms[mi]:'';
            }},
          axisLine:{lineStyle:{color:'#E0DCD2'}},axisTick:{show:false}},
        yAxis:{type:'value',scale:false,
          axisLabel:{fontSize:10.5,color:'#6B7186',formatter:'{value}%'},
          splitLine:{lineStyle:{color:'#F0EEE8'}}},
        series:ser
      });
      nt.innerHTML='';
    }else{
      const rankKey=vs.rankSel.r123?'r123':'r1', blk=rankKey==='r123'?b3:b1;
      const list=shownLabels.map(l=>({label:l,values:getVals(blk,l)}));
      const ms=months.slice(vs.rs,vs.re+1);
      drawByType(vs.ct,ms,sliceList(list,vs.rs,vs.re),{unitLabel:'%',stackMode:vs.stackMode});
      nt.innerHTML='';
    }
    renderAlignedGap(chart,months,vs.rs,vs.re,gapRowsTwo(jk3||jk1,sr3||sr1,cg3||cg1,'%'),vs.ct==='bar');
    /* For rank bar chart: x-axis has [n_brands+1]*N_months-1 cats, not N months.
       Month i center = cat index i*(n+1)+(n-1)/2. Pre-compute and pass to overlay. */
    if(vs.ct==='bar'){
      const n=shownLabels.length;
      const N2=vs.re-vs.rs+1;
      const rankPx=[];let rOk=true;
      for(let i=0;i<N2;i++){
        const ci=i*(n+1)+(n-1)/2;
        try{const px=chart.convertToPixel({xAxisIndex:0},ci);
          if(typeof px==='number'&&isFinite(px))rankPx.push(px);else{rOk=false;break;}
        }catch(_){rOk=false;break;}
      }
      renderCampaignOverlay(chart,months,vs.rs,vs.re,shownLabels,vs.ct,rOk?rankPx:null);
    }else{
      renderCampaignOverlay(chart,months,vs.rs,vs.re,shownLabels,vs.ct);
    }
  }
  paint();
}

function vRadarOne(v){

  const attrsAll=blocks[0].series.map(s=>s.label).filter(l=>!l.includes('없음')&&!l.includes('미인지'));
  /* Most recent surveyed month index across all brand blocks. */
  const latestMi=(()=>{const len=blocks[0].months.length;
    for(let i=len-1;i>=0;i--){if(blocks.some(b=>b.series.some(s=>s.values[i]!=null&&s.values[i]!==0)))return i;}
    return len-1;})();
  /* Drop attributes whose value is 0 (or null) for EVERY brand at the most recent month.
     Re-evaluated each render, so a new uploaded data table updates the excluded set automatically. */
  const attrs=attrsAll.filter(a=>blocks.some(b=>{const r=b.series.find(s=>s.label===a);const val=r?r.values[latestMi]:null;return val!=null&&val>0;}));
  if(vs.selAttr&&!attrs.includes(vs.selAttr))vs.selAttr=null;
  vs.selAttr=vs.selAttr||attrs[0];
  if(vs.attrHidden.size===0)attrs.forEach(a=>{if(a!==vs.selAttr)vs.attrHidden.add(a);});
  /* sync vs.hidden for attrDd rendering: mark all attrs except selAttr as hidden */
  /* (vs.hidden is used by stmtDropHTML to determine checked/label state for attrDd) */
  function syncAttrHidden(){attrs.forEach(a=>{if(a===vs.selAttr)vs.hidden.delete(a);else vs.hidden.add(a);});}
  /* default: top-5 brands by latest-month value of the selected attribute */
  (function(){
    if(brandsAll.length<=5)return;
    const rows=blocks.filter(b=>!isNonBrand(brandOf(b.title))).map(b=>{
      const ser=b.series.find(s=>s.label===vs.selAttr);
      const vals=ser?ser.values:[];
      let lv=-Infinity;for(let m=vals.length-1;m>=0;m--){if(vals[m]!=null){lv=vals[m];break;}}
      return {brand:brandOf(b.title),v:lv,bold:isBoldLabel(brandOf(b.title))};
    }).sort((a,b)=>b.v-a.v);
    const keep=new Set();
    rows.slice(0,5).forEach(r=>keep.add(r.brand));

        return xs.length?xs.reduce((a,c)=>a+c,0)/xs.length:null;}),
      yearValues:(blocks[0].years&&blocks[0].years.length)?blocks[0].years.map((y,i)=>{
        const xs=jkAttrRows.map(r=>r.yearValues?r.yearValues[i]:null).filter(x=>x!=null);
        return xs.length?xs.reduce((a,c)=>a+c,0)/xs.length:null;}):null};
    const kpi=jkAttrRows.length?kpiHTML(avgSeries.label,avgSeries,months,'%',1,blocks[0].years):'';
    body.innerHTML=kpi+`<div class="subline" style="min-height:16px"></div>
      <div class="card">
        <div class="ctrl-bar">
          <span class="ctrl-label">브랜드</span>${brandDropHTML(brandsAll,vs,'brandDd')}
          ${showAttrPicker?`<span class="ctrl-sep"></span><span class="ctrl-label">속성</span>${stmtDropHTML(attrs,vs,'attrDd',true)}`:''}
          <span class="ctrl-sep"></span>

          <span class="ctrl-sep"></span>

          <button class="btn" id="campTogBtn">캠페인</button><button class="btn" id="gapTogBtn">경쟁사 Gap</button><button class="btn" id="png">PNG</button>

/* ===== Excel upload → data swap ===== */
/* Full question code incl. sub-index (e.g. "SQ1","A10_1","R28"); tag stripped */
function blockFullCode(name){
  const stripped=name.replace(/^\[[^\]]+\]\s*/,'');   /* remove [SA]/[MA]/[Scale] tag */
  const m=stripped.match(/^([A-Za-z]+\d+(?:[-_]\d+)*)/);
  return m?m[1]:stripped.split('.')[0].trim();
}
/* Title portion after the code (e.g. "브랜드 호감도_알바몬"), normalized */
function blockTitlePart(name){
  const stripped=name.replace(/^\[[^\]]+\]\s*/,'');
  const dot=stripped.indexOf('.');
  const after=dot>=0?stripped.slice(dot+1):stripped;
  return after.replace(/\s+/g,'').replace(/[()\[\]·・]/g,'').toLowerCase();
}
/* A block matches a member iff BOTH code and title-part agree (double check) */
function blockMatchesMember(block,memberTitle){
  return blockFullCode(block.name)===blockFullCode(memberTitle)
      && blockTitlePart(block.name)===blockTitlePart(memberTitle);
}
function buildCodeIndex(data){
  const idx={};
  data.blocks.forEach(b=>{const c=blockFullCode(b.name);(idx[c]=idx[c]||[]).push(b);});
  return idx;
}
function memberResolves(idx,memberTitle){
  const cands=idx[blockFullCode(memberTitle)]||[];
  return cands.some(b=>blockMatchesMember(b,memberTitle));
}

/* Verify: how many member blocks in the current config still exist in new data */
function validateNewData(newData){
  const idx=buildCodeIndex(newData);
  const missing=[];let matched=0;
  (CFG._allViews||CFG.views).forEach(v=>{
    (v.members||[]).forEach(mt=>{memberResolves(idx,mt)?matched++:missing.push(mt);});
  });
  return {ok:matched>0,missing,matched};
}

/* Swap in new data: replace DATA, re-run cleanBlock/R28 fix, rebuild lookups, filter menu, re-render */
function applyNewData(newData){
  sanitizeBlocks(newData.blocks);
  DATA=newData;
  window.__DATA__=newData;
  DATA.blocks.forEach(b=>{b._cleaned=false;cleanBlock(b);});
  const r28=DATA.blocks.find(b=>b.name&&b.name.startsWith('R28.'));
  if(r28)r28.series.forEach(s=>{
    if(s.label==='알바몬')s.label='알바몬 (복수 응답)';
    else if(s.label.startsWith('[알바몬 Only'))s.label='알바몬 (단수 응답)';
  });
  for(const k in byTitle)delete byTitle[k];
  DATA.blocks.forEach(b=>byTitle[b.title]=b);
  /* Keep views whose members resolve; BPI-type view kept if BPI sheet has data */
  const idx=buildCodeIndex(DATA);
  CFG.views=CFG._allViews.filter(v=>{
    if(v.type==='bpi')return DATA.bpi&&DATA.bpi.series&&DATA.bpi.series.length>0;
    return (v.members||[]).some(mt=>memberResolves(idx,mt));
  });
  state.openSecs=new Set();
  renderList();
  const tomIdx=CFG.views.findIndex(v=>v.title.includes('TOM'));
  state.view=tomIdx>=0?tomIdx:0;
  if(CFG.views.length){state.openSecs.add(CFG.views[state.view].section);renderList();renderView(CFG.views[state.view]);}
}

const GH_LS_KEY='jk_dash_gh_cfg';
function ghReadCfg(){

function ghLoadSaved(){

    /* pre-fill repo/path/branch from window.__GH__ as defaults */
    if(document.getElementById('ghRepo')&&!document.getElementById('ghRepo').value)
      document.getElementById('ghRepo').value=gh.repo||'';
    if(document.getElementById('ghPath')&&!document.getElementById('ghPath').value)

    if(document.getElementById('ghBranch')&&!document.getElementById('ghBranch').value)

    /* then override with saved config (includes token) */
    const raw=localStorage.getItem(GH_LS_KEY);if(!raw)return;
